        const App = () => {
            const [session, setSession] = useState(null);

            const [viewMode, setViewMode] = useState('chart');

            const [botYield, setBotYield] = useState(1.0);

            const [sessionPerspective, setSessionPerspective] = useState('root');

            const [toast, setToast] = useState({ show: false, message: '' });
            const [showModal, setShowModal] = useState(false);
            const [modalMode, setModalMode] = useState('add');
            const [selectedMemberId, setSelectedMemberId] = useState('');
            const [confirmModal, setConfirmModal] = useState({ show: false, title: '', message: '', action: null });

            const [form, setForm] = useState({ name: '', refCode: '', uid: '', email: '', phone: '' });
            const [formCustodias, setFormCustodias] = useState([]);

            const [zoom, setZoom] = useState(1.0);
            const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

            const showNotification = (msg) => {
                setToast({ show: true, message: msg });
                setTimeout(() => setToast({ show: false, message: '' }), 3000);
            };

            // ESCUTA ESTADO DE AUTENTICAÇÃO DO SUPABASE (Corrigido para evitar loading infinito se deslogado)
            useEffect(() => {
                const client = getSupabase();
                if (!client) {
                    setLoading(false);
                    return;
                }

                client.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    if (!session) {
                        setLoading(false);
                    }
                }).catch(() => {
                    setLoading(false);
                });

                const { data: { subscription } } = client.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                    if (!session) {
                        setLoading(false);
                    }
                });

                return () => {
                    if (subscription && typeof subscription.unsubscribe === 'function') {
                        subscription.unsubscribe();
                    }
                };
            }, []);

            const fetchNetwork = async () => {
                if (!session) {
                    setLoading(false);
                    return;
                }

                setLoading(true);
                const client = getSupabase();
                
                if (!client) {
                    const local = localStorage.getItem('crm_vip_network_v2');
                    if (local) {
                        try {
                            setNetwork(migrateNetworkData(JSON.parse(local)));
                        } catch (e) {
                            setNetwork(getFactoryCleanState());
                        }
                    } else {
                        const fresh = getFactoryCleanState();
                        setNetwork(fresh);
                        localStorage.setItem('crm_vip_network_v2', JSON.stringify(fresh));
                    }
                    setDbConfigured(false);
                    setLoading(false);
                    return;
                }

                try {
                    const { data, error } = await client
                        .from('simulador_rede')
                        .select('*')
                        .eq('user_id', session.user.id);
                    
                    if (error) throw error;

                    if (data && data.length > 0) {
                        const networkObj = {};
                        data.forEach(item => {
                            let custodias = item.custodias;
                            if (!custodias || !Array.isArray(custodias)) {
                                custodias = [
                                    { id: 'c_mig_' + item.id, label: 'Custódia Bitradex', value: parseFloat(item.personal) || 0, rate: 15 }
                                ];
                            }
                            networkObj[item.id] = {
                                id: item.id,
                                name: item.name,
                                uid: item.uid,
                                refCode: item.ref_code,
                                email: item.email,
                                phone: item.phone,
                                custodias: custodias,
                                children: item.children || []
                            };
                        });

                        if (!networkObj['root']) {
                            networkObj['root'] = getFactoryCleanState()['root'];
                        }
                        setNetwork(networkObj);
                    } else {
                        const seed = getFactoryCleanState();
                        setNetwork(seed);
                        const uploads = Object.values(seed).map(node => ({
                            id: node.id,
                            name: node.name,
                            uid: node.uid,
                            ref_code: node.refCode,
                            email: node.email,
                            phone: node.phone,
                            personal: getPersonalSum(node),
                            custodias: node.custodias,
                            children: node.children,
                            user_id: session.user.id
                        }));
                        await client.from('simulador_rede').upsert(uploads);
                    }
                    setDbConfigured(true);
                } catch (err) {
                    console.warn("Sem acesso ao banco online, fallback local:", err.message);
                    setNetwork(getFactoryCleanState());
                    setDbConfigured(false);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                if (session) {
                    fetchNetwork();
                }
            }, [session]);

            const handleSignUp = async (e) => {
                e.preventDefault();
                setAuthError('');
                const client = getSupabase();
                if (!client) return showNotification("Erro: Supabase não inicializado.");

                setLoading(true);
                const { data, error } = await client.auth.signUp({ email, password });
                setLoading(false);
                
                if (error) {
                    setAuthError(error.message);
                } else {
                    showNotification("Registo efetuado com sucesso!");
                }
            };

            const handleSignIn = async (e) => {
                e.preventDefault();
                setAuthError('');
                const client = getSupabase();
                if (!client) return;

                setLoading(true);
                const { data, error } = await client.auth.signInWithPassword({ email, password });
                setLoading(false);

                if (error) {
                    setAuthError(error.message);
                } else {
                    showNotification("Sessão iniciada!");
                }
            };

            const handleSignOut = async () => {
                const client = getSupabase();
                if (client) {
                    await client.auth.signOut();
                    setSession(null);
                    setNetwork({});
                    showNotification("Sessão terminada.");
                }
            };

            const stats = useMemo(() => {
                if (Object.keys(network).length === 0) return {};

                const results = {};
                const calculateNode = (id) => {
                    const node = network[id];
                    if (!node) return { teamVol: 0, directsActive: 0, level: 'Membro', vipLabel: 'V0 (Básico)', level1: 0, level2: 0, level3Plus: 0, hasVipInTree: 'Membro' };

                    let teamVol = 0;
                    let directsActive = 0;
                    let childVips = [];

                    node.children.forEach(cid => {
                        const childStats = calculateNode(cid);
                        const child = network[cid];
                        if (child) {
                            const childPersonal = getPersonalSum(child);
                            teamVol += childPersonal + childStats.teamVol;
                            if (childPersonal >= 100) directsActive++;
                            childVips.push({ id: cid, level: childStats.level });
                        }
                    });

                    let currentLevel = 'Membro';
                    const userPersonalSum = getPersonalSum(node);

                    for (const rule of VIP_RULES) {
                        if (rule.level === 'Membro') continue;
                        const hasPersonal = userPersonalSum >= rule.reqPersonal;
                        const hasTeamVol = teamVol >= rule.reqTeamVol;
                        const hasDirects = directsActive >= rule.reqDirects;
                        
                        let hasVipLines = true;
                        if (rule.prevVip) {
                            const linesWithPrevVip = childVips.filter(cv => 
                                cv.level === rule.prevVip || results[cv.id]?.hasVipInTree === rule.prevVip
                            ).length;
                            hasVipLines = linesWithPrevVip >= 2;
                        }

                        if (hasPersonal && hasTeamVol && hasDirects && hasVipLines) {
                            currentLevel = rule.level;
                            break;
                        }
                    }

                    let level1 = 0;
                    let level2 = 0;
                    let level3Plus = 0;

                    const traverseDepths = (nodeId, depth) => {
                        const targetNode = network[nodeId];
                        if (!targetNode) return;
                        targetNode.children.forEach(cid => {
                            if (depth === 1) level1++;
                            else if (depth === 2) level2++;
                            else level3Plus++;
                            traverseDepths(cid, depth + 1);
                        });
                    };
                    traverseDepths(id, 1);

                    const vipLabel = currentLevel === 'Membro' ? 'V0 (Básico)' : `V${currentLevel.replace('VIP', '')}`;

                    results[id] = {
                        teamVol,
                        directsActive,
                        level: currentLevel,
                        vipLabel,
                        level1,
                        level2,
                        level3Plus,
                        hasVipInTree: currentLevel === 'Membro' ? 
                            (childVips.some(cv => results[cv.id]?.hasVipInTree !== 'Membro') ? 'VIP1' : 'Membro') : currentLevel
                    };

                    return results[id];
                };

                const startNode = hasPatriarch ? 'patriarca' : 'root';
                if (network[startNode]) calculateNode(startNode);
                if (!hasPatriarch && network['root']) calculateNode('root');

                return results;
            }, [network, hasPatriarch]);

            const visibleMembers = useMemo(() => {
                const visible = new Set();
                const traverse = (id) => {
                    if (!id || !network[id]) return;
                    visible.add(id);
                    if (network[id].children) {
                        network[id].children.forEach(cid => traverse(cid));
                    }
                };
                traverse(sessionPerspective);
                return visible;
            }, [network, sessionPerspective]);

            const earnings = useMemo(() => {
                let direct = 0, indirect = 0, diff = 0, matchingSameLevel = 0;
                
                const currentRootId = sessionPerspective;
                if (!stats[currentRootId]) return { personalDaily: 0, personalMonthly: 0, direct: 0, indirect: 0, diff: 0, matchingSameLevel: 0, teamDaily: 0, totalDaily: 0, totalMonthly: 0 };

                const myRate = VIP_RULES.find(r => r.level === stats[currentRootId]?.level)?.rate || 0;
                const personalMonthlyProfit = getMonthlyYield(network[currentRootId]);
                const personalDailyProfit = personalMonthlyProfit / 30;

                const traverse = (id, depth = 0) => {
                    const userNode = network[id];
                    if (!userNode) return;
                    
                    if (id !== currentRootId) {
                        const userMonthlyYield = getMonthlyYield(userNode);
                        const userDailyYield = userMonthlyYield / 30;

                        if (depth === 1) {
                            direct += userDailyYield * 0.10;
                        } else if (depth === 2) {
                            indirect += userDailyYield * 0.05;
                        }

                        const dailyBotYield = getPersonalSum(userNode) * (botYield / 100);
                        const userRate = VIP_RULES.find(r => r.level === stats[id]?.level)?.rate || 0;
                        
                        if (myRate > userRate) {
                            diff += dailyBotYield * (myRate - userRate);
                        } else if (myRate === userRate && myRate > 0) {
                            const memberDailyBotYield = (stats[id]?.teamVol || 0) * (botYield / 100);
                            matchingSameLevel += memberDailyBotYield * 0.10 * 0.20;
                        }
                    }

                    userNode.children.forEach(cid => traverse(cid, depth + 1));
                };

                traverse(currentRootId);
                const teamDaily = direct + indirect + diff + matchingSameLevel;

                return {
                    personalDaily: personalDailyProfit,
                    personalMonthly: personalMonthlyProfit,
                    direct,
                    indirect,
                    diff,
                    matchingSameLevel,
                    teamDaily,
                    totalDaily: personalDailyProfit + teamDaily,
                    totalMonthly: (personalDailyProfit * 30) + (teamDaily * 30)
                };
            }, [network, stats, botYield, sessionPerspective]);

            const roadmap = useMemo(() => {
                const currentLevel = stats[sessionPerspective]?.level || 'Membro';
                if (currentLevel === 'VIP6') return null;
                const currentIndex = VIP_RULES.findIndex(r => r.level === currentLevel);
                const nextRule = VIP_RULES[currentIndex - 1];
                const activePersonalSum = getPersonalSum(network[sessionPerspective]);
                return {
                    nextLevel: nextRule.level,
                    personal: { req: nextRule.reqPersonal, current: activePersonalSum, done: activePersonalSum >= nextRule.reqPersonal },
                    teamVol: { req: nextRule.reqTeamVol, current: stats[sessionPerspective]?.teamVol || 0, done: (stats[sessionPerspective]?.teamVol || 0) >= nextRule.reqTeamVol },
                    directs: { req: nextRule.reqDirects, current: stats[sessionPerspective]?.directsActive || 0, done: (stats[sessionPerspective]?.directsActive || 0) >= nextRule.reqDirects }
                };
            }, [network, stats, sessionPerspective]);

            const saveLocalOrCloud = async (updatedNetwork, newId = null, targetParentId = null) => {
                setNetwork(updatedNetwork);
                localStorage.setItem('crm_vip_network_v2', JSON.stringify(updatedNetwork));

                const client = getSupabase();
                if (client && dbConfigured && session) {
                    try {
                        const listToUpsert = [];
                        if (newId) {
                            listToUpsert.push({
                                id: newId,
                                name: updatedNetwork[newId].name,
                                uid: updatedNetwork[newId].uid,
                                ref_code: updatedNetwork[newId].refCode,
                                email: updatedNetwork[newId].email,
                                phone: updatedNetwork[newId].phone,
                                personal: getPersonalSum(updatedNetwork[newId]),
                                custodias: updatedNetwork[newId].custodias,
                                children: [],
                                user_id: session.user.id 
                            });
                        }
                        if (targetParentId) {
                            listToUpsert.push({
                                id: targetParentId,
                                name: updatedNetwork[targetParentId].name,
                                uid: updatedNetwork[targetParentId].uid,
                                ref_code: updatedNetwork[targetParentId].refCode,
                                email: updatedNetwork[targetParentId].email,
                                phone: updatedNetwork[targetParentId].phone,
                                personal: getPersonalSum(updatedNetwork[targetParentId]),
                                custodias: updatedNetwork[targetParentId].custodias,
                                children: updatedNetwork[targetParentId].children,
                                user_id: session.user.id 
                            });
                        }
                        if (!newId && !targetParentId && selectedMemberId) {
                            listToUpsert.push({
                                id: selectedMemberId,
                                name: updatedNetwork[selectedMemberId].name,
                                uid: updatedNetwork[selectedMemberId].uid,
                                ref_code: updatedNetwork[selectedMemberId].refCode,
                                email: updatedNetwork[selectedMemberId].email,
                                phone: updatedNetwork[selectedMemberId].phone,
                                personal: getPersonalSum(updatedNetwork[selectedMemberId]),
                                custodias: updatedNetwork[selectedMemberId].custodias,
                                children: updatedNetwork[selectedMemberId].children,
                                user_id: session.user.id 
                            });
                        }

                        if (listToUpsert.length > 0) {
                            await client.from('simulador_rede').upsert(listToUpsert);
                        }
                    } catch (e) {
                        console.error("Erro ao gravar dados no Supabase:", e);
                        showNotification("Gravado apenas localmente. Erro na nuvem.");
                    }
                }
            };

            const handleSaveMember = async () => {
                if (!form.name) return showNotification("O nome é obrigatório.");
                let updatedNetwork = { ...network };

                if (modalMode === 'add') {
                    const newId = `user_${Date.now()}`;
                    updatedNetwork[newId] = {
                        id: newId,
                        name: form.name,
                        uid: form.uid || `UID-${Date.now().toString().slice(-6)}`,
                        refCode: form.refCode || `REF-${Date.now().toString().slice(-4)}`,
                        email: form.email,
                        phone: form.phone,
                        custodias: formCustodias,
                        children: []
                    };
                    updatedNetwork[selectedMemberId].children.push(newId);
                    await saveLocalOrCloud(updatedNetwork, newId, selectedMemberId);
                    showNotification(`Membro "${form.name}" registado com sucesso!`);
                } else {
                    updatedNetwork[selectedMemberId] = {
                        ...updatedNetwork[selectedMemberId],
                        name: form.name,
                        uid: form.uid,
                        refCode: form.refCode,
                        email: form.email,
                        phone: form.phone,
                        custodias: formCustodias
                    };
                    await saveLocalOrCloud(updatedNetwork);
                    showNotification(`Dados de "${form.name}" atualizados!`);
                }
                setShowModal(false);
            };

            const handleRemoveMember = (id) => {
                if (id === 'root' || id === 'patriarca') return;
                setConfirmModal({
                    show: true,
                    title: "Excluir Membro da Rede",
                    message: `Pretende eliminar "${network[id]?.name}"? Esta ação removerá também todos os sub-membros desta ramificação de forma definitiva na nuvem.`,
                    action: async () => {
                        let updatedNetwork = { ...network };
                        let parentId = Object.keys(updatedNetwork).find(k => updatedNetwork[k].children.includes(id));

                        if (parentId) {
                            updatedNetwork[parentId].children = updatedNetwork[parentId].children.filter(cid => cid !== id);
                        }

                        const deletedIds = [];
                        const cleanNodes = (nodeId) => {
                            const node = updatedNetwork[nodeId];
                            if (node) {
                                node.children.forEach(cleanNodes);
                                deletedIds.push(nodeId);
                                delete updatedNetwork[nodeId];
                            }
                        };
                        cleanNodes(id);

                        setNetwork(updatedNetwork);
                        localStorage.setItem('crm_vip_network_v2', JSON.stringify(updatedNetwork));

                        const client = getSupabase();
                        if (client && dbConfigured && session) {
                            try {
                                if (parentId) {
                                    await client.from('simulador_rede').update({ children: updatedNetwork[parentId].children }).eq('id', parentId);
                                }
                                await client.from('simulador_rede').delete().in('id', deletedIds).eq('user_id', session.user.id);
                                showNotification("Sincronizado e removido na base de dados online.");
                            } catch (e) {
                                showNotification("Removido localmente. Erro ao sincronizar remoção na nuvem.");
                            }
                        } else {
                            showNotification("Membro removido localmente.");
                        }
                    }
                });
            };

            const triggerReset = () => {
                setConfirmModal({
                    show: true,
                    title: "Reiniciar Todo o Sistema",
                    message: "Atenção! Esta ação apagará todos os dados customizados da nuvem e do armazenamento local, redefinindo o ecossistema com os investidores modelo.",
                    action: async () => {
                        const clean = getFactoryCleanState();
                        setNetwork(clean);
                        localStorage.setItem('crm_vip_network_v2', JSON.stringify(clean));
                        setSessionPerspective('root');
                        setHasPatriarch(true);

                        const client = getSupabase();
                        if (client && dbConfigured && session) {
                            try {
                                await client.from('simulador_rede').delete().eq('user_id', session.user.id);
                                const uploads = Object.values(clean).map(node => ({
                                    id: node.id,
                                    name: node.name,
                                    uid: node.uid,
                                    ref_code: node.refCode,
                                    email: node.email,
                                    phone: node.phone,
                                    personal: getPersonalSum(node),
                                    custodias: node.custodias,
                                    children: node.children,
                                    user_id: session.user.id
                                }));
                                await client.from('simulador_rede').upsert(uploads);
                                showNotification("Sincronização redefinida para os dados padrão!");
                            } catch (e) {
                                showNotification("Erro ao atualizar o banco online. Redefinido apenas local.");
                            }
                        } else {
                            showNotification("Redefinido offline com sucesso.");
                        }
                    }
                });
            };

            const togglePatriarch = () => {
                setHasPatriarch(prev => {
                    const newVal = !prev;
                    if (!newVal) setSessionPerspective('root');
                    showNotification(newVal ? "Patriarca ativado. Visibilidade ampliada." : "Simulando visão estrita de 'Você'.");
                    return newVal;
                });
            };

            const exportToExcel = () => {
                if (typeof XLSX === 'undefined') {
                    showNotification("Ferramenta de exportação ainda a carregar.");
                    return;
                }
                const rows = [];
                const startNode = sessionPerspective;

                const traverse = (id, depth = 0) => {
                    const u = network[id];
                    const uStat = stats[id];
                    if (!u || !uStat || !visibleMembers.has(id)) return;

                    rows.push({
                        "Hierarquia": id === 'patriarca' ? "Patriarca" : (id === 'root' ? "Você (Líder)" : `Nível ${depth}`),
                        "Nome": u.name,
                        "UID": u.uid,
                        "Código Ref": u.refCode,
                        "E-mail": u.email || 'N/D',
                        "Telefone": u.phone || 'N/D',
                        "Aporte Total ($)": getPersonalSum(u),
                        "Qtd Custódias": u.custodias?.length || 0,
                        "Rendimento Mensal ($)": getMonthlyYield(u),
                        "Volume de Equipe ($)": uStat.teamVol,
                        "1º Nível (Diretos)": uStat.level1,
                        "2º Nível (Indiretos)": uStat.level2,
                        "3º Nível+ (Profundidade)": uStat.level3Plus,
                        "Classificação VIP": uStat.vipLabel
                    });
                    u.children.forEach(cid => traverse(cid, depth + 1));
                };

                traverse(startNode);
                const worksheet = XLSX.utils.json_to_sheet(rows);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Minha_Rede_Bitradex");
                XLSX.writeFile(workbook, `Bitradex_Relatorio_Rede_${Date.now()}.xlsx`);
            };

            const openAddModal = (parentId) => {
                setModalMode('add');
                setSelectedMemberId(parentId);
                setForm({ name: '', refCode: '', uid: '', email: '', phone: '' });
                setFormCustodias([{ id: 'c_' + Date.now(), label: 'Custódia Bitradex', value: 100, rate: 15 }]);
                setShowModal(true);
            };

            const openEditModal = (id) => {
                setModalMode('edit');
                setSelectedMemberId(id);
                const m = network[id];
                setForm({
                    name: m.name,
                    refCode: m.refCode || '',
                    uid: m.uid || '',
                    email: m.email || '',
                    phone: m.phone || ''
                });
                setFormCustodias(m.custodias ? [...m.custodias] : [{ id: 'c_' + Date.now(), label: 'Banca Standard', value: 0, rate: 15 }]);
                setShowModal(true);
            };

            const handleMouseDown = (e) => {
                if (e.target.closest('button') || e.target.closest('input')) return;
                setIsDragging(true);
                setDragStart({ x: e.clientX - panOffset.x, y: e.clientY - panOffset.y });
            };

            const handleMouseMove = (e) => {
                if (!isDragging) return;
                setPanOffset({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
            };

            const handleMouseUp = () => {
                setIsDragging(false);
            };

            const handleTouchStart = (e) => {
                if (e.target.closest('button') || e.target.closest('input')) return;
                const touch = e.touches[0];
                setIsDragging(true);
                setDragStart({ x: touch.clientX - panOffset.x, y: touch.clientY - panOffset.y });
            };

            const handleTouchMove = (e) => {
                if (!isDragging) return;
                const touch = e.touches[0];
                setPanOffset({ x: touch.clientX - dragStart.x, y: touch.clientY - dragStart.y });
            };

            if (loading && !session) {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center bg-[#05070e] text-gray-400 space-y-4">
                        <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-sm font-semibold tracking-wide">A conectar ao servidor...</p>
                    </div>
                );
            }

            if (!session) {
                return (
                    <div className="min-h-screen bg-[#05070e] flex items-center justify-center p-4">
                        <div className="bg-[#0b0e1a] border border-[#1c273e] p-8 rounded-3xl max-w-md w-full space-y-6 shadow-2xl relative overflow-hidden">
                            <div className="text-center">
                                <span className="p-3.5 bg-gradient-to-r from-emerald-500 to-indigo-600 rounded-2xl text-white font-extrabold text-2xl inline-block mb-3 shadow-lg shadow-indigo-950/50">BX</span>
                                <h2 className="text-2xl font-black text-white">Painel Bitradex SaaS</h2>
                                <p className="text-xs text-gray-400 mt-1">
                                    {authMode === 'login' ? 'Inicie sessão para gerir a sua rede' : 'Registe o seu perfil de líder de equipe'}
                                </p>
                            </div>

                            {authError && (
                                <div className="bg-red-950/40 border border-red-900 text-red-400 p-3 rounded-xl text-xs text-center font-bold">
                                    ⚠️ {authError}
                                </div>
                            )}

                            <form onSubmit={authMode === 'login' ? handleSignIn : handleSignUp} className="space-y-4">
                                <div>
                                    <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Endereço de E-mail</label>
                                    <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-indigo-500" placeholder="lider@exemplo.com" />
                                </div>
                                <div>
                                    <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Palavra-passe</label>
                                    <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-indigo-500" placeholder="••••••••" />
                                </div>

                                <button type="submit" className="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-500 hover:to-indigo-600 text-white font-bold py-3 rounded-xl transition-all shadow-lg text-sm shadow-indigo-950/40">
                                    {authMode === 'login' ? 'Entrar no Painel' : 'Criar Conta Gratuita'}
                                </button>
                            </form>

                            <div className="text-center text-xs">
                                <button type="button" onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')} className="text-indigo-400 hover:underline">
                                    {authMode === 'login' ? 'Não tem uma conta SaaS? Registe-se' : 'Já possui conta de líder? Faça login'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (loading && Object.keys(network).length === 0) {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center bg-[#05070e] text-gray-400 space-y-4">
                        <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-sm font-semibold tracking-wide">A carregar a sua equipa online...</p>
                    </div>
                );
            }

            return (
                <div className="flex-1 flex flex-col min-h-screen bg-[#05070e]">
                    {/* Header */}
                    <header className="bg-[#0b0e1a] border-b border-[#1b253b] px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 sticky top-0 z-40">
                        <div className="flex items-center gap-3">
                            <span className="p-2.5 bg-gradient-to-r from-emerald-500 to-indigo-600 rounded-xl text-white font-extrabold text-lg tracking-wider shadow-lg shadow-indigo-950/40">BX</span>
                            <div>
                                <h1 className="text-lg font-black tracking-tight text-white flex items-center gap-2">
                                    Painel Bitradex <span className="text-xs bg-indigo-500/20 text-indigo-400 font-extrabold px-2 py-0.5 rounded-full">Base de Dados Real</span>
                                </h1>
                                <p className="text-xs text-gray-400 font-medium truncate max-w-[280px] sm:max-w-none">Sessão: {session.user.email}</p>
                            </div>
                        </div>

                        <div className="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto">
                            <div className="bg-[#12192c] p-1.5 rounded-xl border border-slate-800 flex items-center gap-2 w-full sm:w-auto">
                                <span className="text-[10px] text-gray-400 font-bold px-2 uppercase tracking-wider">Sessão Ativa:</span>
                                <div className="flex gap-1 w-full sm:w-auto">
                                    <button
                                        onClick={() => {
                                            setSessionPerspective('root');
                                            showNotification("Sessão alterada para: Sua Conta (Você)");
                                        }}
                                        className={`text-xs px-3 py-1.5 rounded-lg font-bold transition-all w-full sm:w-auto ${sessionPerspective === 'root' ? 'bg-indigo-600 text-white shadow-md' : 'text-gray-400 hover:text-white'}`}
                                    >
                                        Você (Líder)
                                    </button>
                                    {hasPatriarch && network['patriarca'] && (
                                        <button
                                            onClick={() => {
                                                setSessionPerspective('patriarca');
                                                showNotification("Sessão alterada para: Patriarca (Upline)");
                                            }}
                                            className={`text-xs px-3 py-1.5 rounded-lg font-bold transition-all w-full sm:w-auto ${sessionPerspective === 'patriarca' ? 'bg-yellow-600 text-black shadow-md' : 'text-gray-400 hover:text-white'}`}
                                        >
                                            Patriarca
                                        </button>
                                    )}
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-2 bg-gray-900/80 px-4 py-2 rounded-xl border border-gray-800">
                                <span className={`w-2.5 h-2.5 rounded-full ${dbConfigured ? 'bg-emerald-500 animate-pulse' : 'bg-amber-500'}`}></span>
                                <span className="text-xs font-semibold text-gray-300">
                                    {dbConfigured ? 'Nuvem Conectada' : 'Modo Local (Offline)'}

                    {showModal && (
                        <div className="fixed inset-0 bg-black/75 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-[#0b0e1a] border border-[#1c273e] rounded-2xl max-w-lg w-full p-6 space-y-4 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
                                <div className="flex justify-between items-center border-b border-slate-800 pb-3">
                                    <h3 className="font-bold text-lg text-gray-200">
                                        {modalMode === 'add' ? 'Cadastrar Novo Indicado' : `Editar Dados de: ${form.name}`}
                                    </h3>
                                    <button onClick={() => setShowModal(false)} className="text-gray-500 hover:text-gray-350">
                                        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                                    <div className="md:col-span-2">
                                        <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Nome Completo do Membro *</label>
                                        <input type="text" value={form.name} onChange={(e) => setForm({...form, name: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none text-gray-200" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Código de Indicação (Ref)</label>
                                        <input type="text" value={form.refCode} onChange={(e) => setForm({...form, refCode: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none text-gray-200" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Código UID</label>
                                        <input type="text" value={form.uid} onChange={(e) => setForm({...form, uid: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none text-gray-200" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">E-mail</label>
                                        <input type="email" value={form.email} onChange={(e) => setForm({...form, email: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none text-gray-200" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Telefone</label>
                                        <input type="text" value={form.phone} onChange={(e) => setForm({...form, phone: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none text-gray-200" />
                                    </div>

                                    {/* Módulo de Custódias */}
                                    <div className="md:col-span-2 bg-[#12192c] p-4 rounded-xl border border-slate-800 space-y-4">
                                        <div className="flex justify-between items-center border-b border-slate-800 pb-2">
                                            <h4 className="text-xs font-bold text-indigo-400 uppercase tracking-wider">Custódias Ativas</h4>
                                            <span className="text-[10px] text-gray-400 font-mono">Qtd: {formCustodias.length}</span>
                                        </div>

                                        <div className="space-y-3 max-h-[200px] overflow-y-auto no-scrollbar pr-1">
                                            {formCustodias.map((cust, idx) => (
                                                <div key={cust.id} className="bg-slate-950 p-3 rounded-lg border border-slate-800/80 flex flex-col gap-2 relative">
                                                    <button 
                                                        onClick={() => {
                                                            if (formCustodias.length === 1) return showNotification("Mantenha pelo menos 1 custódia ativa.");
                                                            setFormCustodias(formCustodias.filter(c => c.id !== cust.id));
                                                        }}
                                                        className="absolute top-2 right-2 text-red-500 hover:text-red-400 text-[10px] font-bold"
                                                    >
                                                        🗑️ Remover
                                                    </button>
                                                    <div className="grid grid-cols-12 gap-2 mt-2">
                                                        <div className="col-span-6">
                                                            <label className="block text-[8px] text-gray-500 uppercase font-black mb-1">Nome/Rótulo</label>
                                                            <input type="text" value={cust.label} onChange={(e) => {
                                                                const updated = [...formCustodias];
                                                                updated[idx].label = e.target.value;
                                                                setFormCustodias(updated);
                                                            }} className="w-full bg-slate-900 border border-slate-800 rounded-lg px-2 py-1 text-xs text-gray-200 focus:outline-none" />
                                                        </div>
                                                        <div className="col-span-3">
                                                            <label className="block text-[8px] text-gray-500 uppercase font-black mb-1">Aporte ($)</label>
                                                            <input type="number" value={cust.value} onChange={(e) => {
                                                                const updated = [...formCustodias];
                                                                updated[idx].value = parseFloat(e.target.value) || 0;
                                                                setFormCustodias(updated);
                                                            }} className="w-full bg-slate-900 border border-slate-800 rounded-lg px-2 py-1 text-xs text-gray-200 focus:outline-none" />
                                                        </div>
                                                        <div className="col-span-3">
                                                            <label className="block text-[8px] text-gray-500 uppercase font-black mb-1">Taxa Rend. (%)</label>
                                                            <input type="number" value={cust.rate} onChange={(e) => {
                                                                const updated = [...formCustodias];
                                                                updated[idx].rate = parseFloat(e.target.value) || 0;
                                                                setFormCustodias(updated);
                                                            }} className="w-full bg-slate-900 border border-slate-800 rounded-lg px-2 py-1 text-xs text-gray-200 focus:outline-none" />
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <button 
                                            type="button"
                                            onClick={() => setFormCustodias([...formCustodias, { id: 'c_' + Date.now() + Math.random().toString(36).substring(2, 4), label: 'Nova Custódia', value: 100, rate: 15 }])}
                                            className="w-full border border-dashed border-indigo-500/40 hover:border-indigo-500/80 hover:bg-indigo-950/20 text-indigo-400 py-2 rounded-xl text-xs font-bold transition-all"
                                        >
                                            + Adicionar Outra Custódia
                                        </button>

                                        <div className="pt-2 border-t border-slate-800 flex justify-between text-[11px] font-bold text-gray-400">
                                            <span>Soma Aportes: <span className="text-emerald-400">${formCustodias.reduce((s, c) => s + (parseFloat(c.value) || 0), 0).toLocaleString()}</span></span>
                                            <span>Rend. Estimado: <span className="text-indigo-400">${formCustodias.reduce((s, c) => s + ((parseFloat(c.value) || 0) * (parseFloat(c.rate) || 0) / 100), 0).toLocaleString()}/mês</span></span>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-3 justify-end text-xs font-bold pt-4 border-t border-slate-850">
                                    <button onClick={() => setShowModal(false)} className="bg-slate-950 hover:bg-slate-900 text-gray-400 border border-slate-800 px-5 py-2.5 rounded-xl">Cancelar</button>
                                    <button onClick={handleSaveMember} className="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl shadow-lg shadow-indigo-900/30">Gravar Dados</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal de Confirmações */}
                    {confirmModal.show && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-[#0b0e1a] border border-red-900 rounded-2xl max-w-sm w-full p-6 space-y-4 shadow-2xl">
                                <h3 className="font-bold text-lg text-red-400 flex items-center gap-2">⚠️ {confirmModal.title}</h3>
                                <p className="text-sm text-gray-300 leading-relaxed">{confirmModal.message}</p>
                                <div className="flex gap-3 justify-end text-xs font-bold pt-2">
                                    <button onClick={() => setConfirmModal({ show: false, title: '', message: '', action: null })} className="bg-slate-800 hover:bg-slate-705 text-gray-300 px-4 py-2 rounded-xl">Cancelar</button>
                                    <button onClick={() => { if (confirmModal.action) confirmModal.action(); setConfirmModal({ show: false, title: '', message: '', action: null }); }} className="bg-red-700 hover:bg-red-600 text-white px-4 py-2 rounded-xl">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); 
    </script>
</body>
</html>
