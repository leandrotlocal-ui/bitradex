<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Bitradex - Gerenciamento de Rede Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #03050a; color: #f3f4f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useMemo, useEffect } = React;

        // --- Componentes de Ícones (Corrigidos para evitar erro #130) ---
        const DashboardIcon = () => (<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="9" rx="1" /><rect x="14" y="3" width="7" height="5" rx="1" /><rect x="14" y="12" width="7" height="9" rx="1" /><rect x="3" y="16" width="7" height="5" rx="1" /></svg>);
        const NetworkIcon = () => (<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>);
        const CalcIcon = () => (<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="4" y="4" width="16" height="16" rx="2" /><line x1="9" y1="9" x2="15" y2="9" /><line x1="9" y1="13" x2="15" y2="13" /><line x1="9" y1="17" x2="15" y2="17" /></svg>);
        const TrashIcon = () => (<svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>);

        // --- Error Boundary robusto ---
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError() { return { hasError: true }; }
            render() {
                if (this.state.hasError) return (
                    <div className="p-10 text-center text-red-500 bg-red-950/20 border border-red-900 rounded-xl m-10">
                        <h2 className="text-xl font-bold">Ocorreu um Erro Crítico</h2>
                        <button onClick={() => window.location.reload()} className="mt-4 bg-red-700 text-white px-4 py-2 rounded">Recarregar Sistema</button>
                    </div>
                );
                return this.props.children;
            }
        }

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            
            return (
                <div className="flex flex-col min-h-screen">
                    <header className="bg-[#0b0e1a] border-b border-[#1b253b] p-6 flex justify-between items-center">
                        <h1 className="text-xl font-black text-white">Painel Bitradex <span className="text-indigo-500">SaaS Pro</span></h1>
                        <nav className="flex gap-2">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex gap-2 items-center px-4 py-2 rounded-lg ${activeTab === 'dashboard' ? 'bg-indigo-600' : 'bg-slate-800'}`}><DashboardIcon/> Dashboard</button>
                            <button onClick={() => setActiveTab('network')} className={`flex gap-2 items-center px-4 py-2 rounded-lg ${activeTab === 'network' ? 'bg-indigo-600' : 'bg-slate-800'}`}><NetworkIcon/> Rede</button>
                            <button onClick={() => setActiveTab('calculator')} className={`flex gap-2 items-center px-4 py-2 rounded-lg ${activeTab === 'calculator' ? 'bg-indigo-600' : 'bg-slate-800'}`}><CalcIcon/> Lucros</button>
                        </nav>
                    </header>

                    <main className="p-6">
                        {activeTab === 'dashboard' && <div className="text-white">Conteúdo do Dashboard aqui...</div>}
                        {activeTab === 'network' && <div className="text-white">Conteúdo da Rede aqui...</div>}
                        {activeTab === 'calculator' && <div className="text-white">Conteúdo da Calculadora aqui...</div>}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
