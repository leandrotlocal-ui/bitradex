        const App = () => {
            const [session, setSession] = useState(null);
            const [authMode, setAuthMode] = useState('login'); 
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [authError, setAuthError] = useState('');

            const [activeTab, setActiveTab] = useState('dashboard');
            const [viewMode, setViewMode] = useState('chart');
            const [botYield, setBotYield] = useState(1.0);
            
            const [uplineSearch, setUplineSearch] = useState('');

            const [toast, setToast] = useState({ show: false, message: '' });
            const [showModal, setShowModal] = useState(false);
            const [modalMode, setModalMode] = useState('add');
            const [selectedMemberId, setSelectedMemberId] = useState('');
            const [confirmModal, setConfirmModal] = useState({ show: false, title: '', message: '', action: null });

            const [form, setForm] = useState({ name: '', refCode: '', uid: '', email: '', phone: '' });
            const [formCustodias, setFormCustodias] = useState([]);

            const [zoom, setZoom] = useState(1.0);
            const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

            const showNotification = (msg) => {
                setToast({ show: true, message: msg });
                setTimeout(() => setToast({ show: false, message: '' }), 4000);
            };

            useEffect(() => {
                const client = getSupabase();
                if (!client) { setLoading(false); return; }

                client.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    if (!session) setLoading(false);
                });

                const { data: { subscription } } = client.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                    if (!session) setLoading(false);
                });

                return () => subscription?.unsubscribe();
            }, []);

            const fetchNetwork = async () => {
                if (!session) return;
                setLoading(true);
                const client = getSupabase();
                if (!client) return;

                try {
                    const { data, error } = await client.from('simulador_rede').select('*');
                    if (error) throw error;

                    const networkObj = {};
                    if (data) {
                        data.forEach(item => {
                            let custodias = item.custodias;
                            if (!custodias || !Array.isArray(custodias)) {
                                custodias = [{ id: 'c_' + item.id, label: 'Custódia Base', value: parseFloat(item.personal) || 0, rate: 15 }];
                            }
                            networkObj[item.id] = {
                                id: item.id,
                                userId: item.user_id,
                                name: item.name,
                                uid: item.uid,
                                refCode: item.ref_code,
                                email: item.email,
                                phone: item.phone,
                                patriarca_id: item.patriarca_id,
                                custodias: custodias,
                                children: item.children || []
                            };
                        });
                    }

                    const myId = session.user.id;
                    if (!networkObj[myId]) {
                        const baseNode = {
                            id: myId,
                            name: 'O Meu Perfil SaaS',
                            uid: `UID-${myId.substring(0,6).toUpperCase()}`,
                            refCode: `REF-${myId.substring(0,4).toUpperCase()}`,
                            email: session.user.email,
                            phone: '',
                            patriarca_id: null,
                            custodias: [{ id: 'c_main', label: 'Banca Principal', value: 0, rate: 15 }],
                            children: [],
                            user_id: myId
                        };
                        networkObj[myId] = { ...baseNode, userId: myId };
                        await client.from('simulador_rede').upsert([baseNode]);
                    }

                    setNetwork(networkObj);
                } catch (err) {
                    console.error("Erro ao buscar a rede global:", err.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { if (session) fetchNetwork(); }, [session]);

            const handleSignUp = async (e) => {
                e.preventDefault();
                setAuthError('');
                setLoading(true);
                const { error } = await getSupabase().auth.signUp({ email, password });
                setLoading(false);
                if (error) setAuthError(error.message);
                else showNotification("Registo efetuado! Pode entrar.");
            };

            const handleSignIn = async (e) => {
                e.preventDefault();
                setAuthError('');
                setLoading(true);
                const { error } = await getSupabase().auth.signInWithPassword({ email, password });
                setLoading(false);
                if (error) setAuthError(error.message);
            };

            const conectarAoPatriarca = async () => {
                if (!uplineSearch.trim()) return showNotification("Introduza o UID, Ref Code ou E-mail do seu Patriarca.");
                setLoading(true);
                const client = getSupabase();
                
                const { data, error } = await client.rpc('conectar_rede_patriarca', {
                    novo_membro_id: session.user.id,
                    termo_busca_patriarca: uplineSearch.trim()
                });

                setLoading(false);
                if (error) {
                    showNotification("Erro ao conectar: " + error.message);
                } else if (data && data.sucesso) {
                    showNotification("🚀 " + data.mensagem);
                    fetchNetwork();
                } else {
                    showNotification("⚠️ " + (data?.mensagem || "Líder não encontrado."));
                }
            };

            const visibleMembers = useMemo(() => {
                if (!session) return new Set();
                const visible = new Set();
                const traverseDown = (id) => {
                    if (!id || !network[id]) return;
                    visible.add(id);
                    network[id].children.forEach(cid => traverseDown(cid));
                };
                traverseDown(session.user.id);
                return visible;
            }, [network, session]);

            const stats = useMemo(() => {
                if (!session || Object.keys(network).length === 0) return {};
                const results = {};

                const calculateNode = (id) => {
                    const node = network[id];
                    if (!node) return { teamVol: 0, directsActive: 0, level: 'Membro', vipLabel: 'V0 (Básico)', level1: 0, level2: 0, level3Plus: 0, hasVipInTree: 'Membro' };

                    let teamVol = 0;
                    let directsActive = 0;
                    let childVips = [];

                    node.children.forEach(cid => {
                        const childStats = calculateNode(cid);
                        const child = network[cid];
                        if (child) {
                            const childPersonal = getPersonalSum(child);
                            teamVol += childPersonal + childStats.teamVol;
                            if (childPersonal >= 100) directsActive++;
                            childVips.push({ id: cid, level: childStats.level });
                        }
                    });

                    let currentLevel = 'Membro';
                    const userPersonalSum = getPersonalSum(node);

                    for (const rule of VIP_RULES) {
                        if (rule.level === 'Membro') continue;
                        const hasPersonal = userPersonalSum >= rule.reqPersonal;
                        const hasTeamVol = teamVol >= rule.reqTeamVol;
                        const hasDirects = directsActive >= rule.reqDirects;
                        let hasVipLines = rule.prevVip ? (childVips.filter(cv => cv.level === rule.prevVip || results[cv.id]?.hasVipInTree === rule.prevVip).length >= 2) : true;

                        if (hasPersonal && hasTeamVol && hasDirects && hasVipLines) {
                            currentLevel = rule.level;
                            break;
                        }
                    }

                    let level1 = 0, level2 = 0, level3Plus = 0;
                    const traverseDepths = (nodeId, depth) => {
                        const targetNode = network[nodeId];
                        if (!targetNode) return;
                        targetNode.children.forEach(cid => {
                            if (depth === 1) level1++;
                            else if (depth === 2) level2++;
                            else level3Plus++;
                            traverseDepths(cid, depth + 1);
                        });
                    };
                    traverseDepths(id, 1);

                    results[id] = {
                        teamVol, directsActive, level: currentLevel,
                        vipLabel: currentLevel === 'Membro' ? 'V0 (Básico)' : `V${currentLevel.replace('VIP', '')}`,
                        level1, level2, level3Plus,
                        hasVipInTree: currentLevel === 'Membro' ? (childVips.some(cv => results[cv.id]?.hasVipInTree !== 'Membro') ? 'VIP1' : 'Membro') : currentLevel
                    };
                    return results[id];
                };

                if (network[session.user.id]) calculateNode(session.user.id);
                return results;
            }, [network, session]);

            const earnings = useMemo(() => {
                let direct = 0, indirect = 0, diff = 0, matchingSameLevel = 0;
                if (!session || !stats[session.user.id]) return { personalDaily: 0, personalMonthly: 0, direct: 0, indirect: 0, diff: 0, matchingSameLevel: 0, teamDaily: 0, totalDaily: 0, totalMonthly: 0 };

                const rootId = session.user.id;
                const myRate = VIP_RULES.find(r => r.level === stats[rootId]?.level)?.rate || 0;
                const personalMonthlyProfit = getMonthlyYield(network[rootId]);
                const personalDailyProfit = personalMonthlyProfit / 30;

                const traverse = (id, depth = 0) => {
                    const userNode = network[id];
                    if (!userNode) return;
                    
                    if (id !== rootId) {
                        const userMonthlyYield = getMonthlyYield(userNode);
                        const userDailyYield = userMonthlyYield / 30;

                        if (depth === 1) direct += userDailyYield * 0.10;
                        else if (depth === 2) indirect += userDailyYield * 0.05;

                        const dailyBotYield = getPersonalSum(userNode) * (botYield / 100);
                        const userRate = VIP_RULES.find(r => r.level === stats[id]?.level)?.rate || 0;
                        
                        if (myRate > userRate) diff += dailyBotYield * (myRate - userRate);
                        else if (myRate === userRate && myRate > 0) matchingSameLevel += (stats[id]?.teamVol || 0) * (botYield / 100) * 0.10 * 0.20;
                    }
                    userNode.children.forEach(cid => traverse(cid, depth + 1));
                };

                traverse(rootId);
                const teamDaily = direct + indirect + diff + matchingSameLevel;
                return {
                    personalDaily: personalDailyProfit, personalMonthly: personalMonthlyProfit,
                    direct, indirect, diff, matchingSameLevel, teamDaily,
                    totalDaily: personalDailyProfit + teamDaily, totalMonthly: (personalDailyProfit * 30) + (teamDaily * 30)
                };
            }, [network, stats, botYield, session]);

            const roadmap = useMemo(() => {
                if (!session || !stats[session.user.id]) return null;
                const currentLevel = stats[session.user.id]?.level || 'Membro';
                if (currentLevel === 'VIP6') return null;
                const currentIndex = VIP_RULES.findIndex(r => r.level === currentLevel);
                const nextRule = VIP_RULES[currentIndex - 1];
                const activePersonalSum = getPersonalSum(network[session.user.id]);
                return {
                    nextLevel: nextRule.level,
                    personal: { req: nextRule.reqPersonal, current: activePersonalSum, done: activePersonalSum >= nextRule.reqPersonal },
                    teamVol: { req: nextRule.reqTeamVol, current: stats[session.user.id]?.teamVol || 0, done: (stats[session.user.id]?.teamVol || 0) >= nextRule.reqTeamVol },
                    directs: { req: nextRule.reqDirects, current: stats[session.user.id]?.directsActive || 0, done: (stats[session.user.id]?.directsActive || 0) >= nextRule.reqDirects }
                };
            }, [network, stats, session]);

            const handleSaveMember = async () => {
                if (!form.name) return showNotification("O nome é obrigatório.");
                const client = getSupabase();
                let updatedNetwork = { ...network };

                if (modalMode === 'add') {
                    const newId = `node_${Date.now()}`;
                    const newNode = {
                        id: newId, 
                        name: form.name, 
                        uid: form.uid || `UID-${Date.now().toString().slice(-4)}`,
                        ref_code: form.refCode, 
                        email: form.email, 
                        phone: form.phone,
                        custodias: formCustodias, 
                        children: [], 
                        user_id: session.user.id, 
                        patriarca_id: selectedMemberId
                    };
                    
                    updatedNetwork[selectedMemberId].children.push(newId);
                    updatedNetwork[newId] = { ...newNode, userId: session.user.id, refCode: form.refCode };
                    setNetwork(updatedNetwork);

                    try {
                        await client.from('simulador_rede').upsert([newNode]);
                        await client.from('simulador_rede').update({ children: updatedNetwork[selectedMemberId].children }).eq('id', selectedMemberId);
                        showNotification("Membro registado e conectado com sucesso!");
                    } catch (e) { showNotification("Gravado localmente. Falha ao enviar para a nuvem."); }
                } else {
                    updatedNetwork[selectedMemberId] = { 
                        ...updatedNetwork[selectedMemberId], 
                        name: form.name, 
                        uid: form.uid, 
                        refCode: form.refCode, 
                        email: form.email, 
                        phone: form.phone, 
                        custodias: formCustodias 
                    };
                    setNetwork(updatedNetwork);
                    try {
                        await client.from('simulador_rede').update({ 
                            name: form.name, 
                            uid: form.uid, 
                            ref_code: form.refCode, 
                            email: form.email, 
                            phone: form.phone, 
                            custodias: formCustodias 
                        }).eq('id', selectedMemberId);
                        showNotification("Dados atualizados na rede!");
                    } catch (e) { showNotification("Atualizado localmente. Falha ao enviar para a nuvem."); }
                }
                setShowModal(false);
            };

            const handleRemoveMember = (id) => {
                if (id === session.user.id) return showNotification("Ação bloqueada. Não pode remover o seu próprio nó primário daqui.");
                if (network[id].userId !== session.user.id) return showNotification("Sem permissão. Este nó pertence a uma conta SaaS independente.");

                setConfirmModal({
                    show: true, title: "Excluir Nó e Downlines",
                    message: `Eliminar "${network[id]?.name}"? Esta ação removerá definitivamente toda a ramificação.`,
                    action: async () => {
                        let updatedNetwork = { ...network };
                        let parentId = Object.keys(updatedNetwork).find(k => updatedNetwork[k].children.includes(id));

                        if (parentId) updatedNetwork[parentId].children = updatedNetwork[parentId].children.filter(cid => cid !== id);

                        const deletedIds = [];
                        const cleanNodes = (nodeId) => {
                            if (updatedNetwork[nodeId]) {
                                updatedNetwork[nodeId].children.forEach(cleanNodes);
                                deletedIds.push(nodeId);
                                delete updatedNetwork[nodeId];
                            }
                        };
                        cleanNodes(id);
                        setNetwork(updatedNetwork);

                        const client = getSupabase();
                        try {
                            if (parentId) await client.from('simulador_rede').update({ children: updatedNetwork[parentId].children }).eq('id', parentId);
                            await client.from('simulador_rede').delete().in('id', deletedIds).eq('user_id', session.user.id);
                            showNotification("Nó e ramificação removidos globalmente.");
                        } catch (e) { showNotification("Erro ao excluir do banco de dados."); }
                    }
                });
            };

            const openAddModal = (parentId) => {
                setModalMode('add'); setSelectedMemberId(parentId);
                setForm({ name: '', refCode: '', uid: '', email: '', phone: '' });
                setFormCustodias([{ id: 'c_' + Date.now(), label: 'Nova Custódia', value: 100, rate: 15 }]);
                setShowModal(true);
            };

            const openEditModal = (id) => {
                if (network[id].userId !== session.user.id) return showNotification("Não pode editar as finanças de um utilizador SaaS independente.");
                setModalMode('edit'); setSelectedMemberId(id);
                const m = network[id];
                setForm({ 
                    name: m.name, 
                    refCode: m.refCode || '', 
                    uid: m.uid || '', 
                    email: m.email || '', 
                    phone: m.phone || '' 
                });
                setFormCustodias(m.custodias ? [...m.custodias] : [{ id: 'c_' + Date.now(), label: 'Custódia Ativa', value: 0, rate: 15 }]);
                setShowModal(true);
            };

            const handleMouseEvents = {
                onMouseDown: (e) => { if (!e.target.closest('button')) { setIsDragging(true); setDragStart({ x: e.clientX - panOffset.x, y: e.clientY - panOffset.y }); } },
                onMouseMove: (e) => { if (isDragging) setPanOffset({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y }); },
                onMouseUp: () => setIsDragging(false),
                onMouseLeave: () => setIsDragging(false)
            };

            if (!session) {
                return (
                    <div className="min-h-screen bg-[#05070e] flex items-center justify-center p-4">
                        <div className="bg-[#0b0e1a] border border-[#1c273e] p-8 rounded-3xl max-w-md w-full space-y-6 shadow-2xl relative">
                            <div className="text-center">
                                <span className="p-3.5 bg-gradient-to-r from-emerald-500 to-indigo-600 rounded-2xl text-white font-extrabold text-2xl inline-block mb-3 shadow-lg shadow-indigo-950/50">BX</span>
                                <h2 className="text-2xl font-black text-white">Rede Global Bitradex</h2>
                                <p className="text-xs text-gray-400 mt-1">{authMode === 'login' ? 'Entre e controle o seu crescimento' : 'Registe-se e integre o ecossistema'}</p>
                            </div>
                            {authError && <div className="bg-red-950/40 border border-red-900 text-red-400 p-3 rounded-xl text-xs text-center font-bold">⚠️ {authError}</div>}
                            <form onSubmit={authMode === 'login' ? handleSignIn : handleSignUp} className="space-y-4">
                                <div>
                                    <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">E-mail</label>
                                    <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500" />
                                </div>
                                <div>
                                    <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Palavra-passe</label>
                                    <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500" />
                                </div>
                                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg text-sm">{authMode === 'login' ? 'Iniciar Sessão' : 'Criar Conta'}</button>
                            </form>
                            <div className="text-center text-xs">
                                <button type="button" onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')} className="text-indigo-400 hover:underline">{authMode === 'login' ? 'Nova conta? Registe-se' : 'Já tem conta? Faça login'}</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (loading && Object.keys(network).length === 0) {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center bg-[#05070e] text-gray-400 space-y-4">
                        <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-sm font-semibold tracking-wide">A carregar Rede Global...</p>
                    </div>
                );
            }

            const me = network[session.user.id];

            return (
                <div className="flex-1 flex flex-col min-h-screen bg-[#05070e]">
                    <header className="bg-[#0b0e1a] border-b border-[#1b253b] px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 sticky top-0 z-40">
                        <div className="flex items-center gap-3">
                            <span className="p-2.5 bg-gradient-to-r from-emerald-500 to-indigo-600 rounded-xl text-white font-extrabold text-lg tracking-wider shadow-lg shadow-indigo-950/40">BX</span>
                            <div>
                                <h1 className="text-lg font-black tracking-tight text-white flex items-center gap-2">Painel Bitradex <span className="text-xs bg-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded-full">Global</span></h1>
                                <p className="text-xs text-gray-400 font-medium">Conta de Rede Isolada: {session.user.email}</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => getSupabase().auth.signOut()} className="bg-slate-800 hover:bg-slate-700 text-gray-300 text-xs font-bold px-4 py-2 rounded-xl transition-all">Sair</button>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <div className="lg:col-span-1 flex flex-row lg:flex-col gap-2 overflow-x-auto lg:overflow-visible pb-2 lg:pb-0">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-all whitespace-nowrap flex-1 lg:flex-initial ${activeTab === 'dashboard' ? 'bg-gradient-to-r from-indigo-600 to-indigo-700 text-white shadow-lg' : 'bg-[#0b0e1a] text-gray-400 border border-[#172136]'}`}><Icons.Dashboard /> Painel Geral</button>
                            <button onClick={() => setActiveTab('network')} className={`flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-all whitespace-nowrap flex-1 lg:flex-initial ${activeTab === 'network' ? 'bg-gradient-to-r from-indigo-600 to-indigo-700 text-white shadow-lg' : 'bg-[#0b0e1a] text-gray-400 border border-[#172136]'}`}><Icons.Network /> Minha Rede</button>
                            <button onClick={() => setActiveTab('calculator')} className={`flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-all whitespace-nowrap flex-1 lg:flex-initial ${activeTab === 'calculator' ? 'bg-gradient-to-r from-indigo-600 to-indigo-700 text-white shadow-lg' : 'bg-[#0b0e1a] text-gray-400 border border-[#172136]'}`}><Icons.Calculator /> Calc. Lucros</button>
                        </div>

                        <div className="lg:col-span-3 space-y-6">
                            {toast.show && (
                                <div className="bg-indigo-950 border border-indigo-700/80 text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3">
                                    <span className="w-2.5 h-2.5 bg-indigo-400 rounded-full animate-ping"></span>
                                    <p className="text-xs font-semibold">{toast.message}</p>
                                </div>
                            )}

                            {activeTab === 'dashboard' && (
                                <div className="space-y-6">
                                    {/* MÓDULO DE INTERLIGAÇÃO (Se não tiver um Patriarca) */}
                                    {me && !me.patriarca_id && (
                                        <div className="bg-gradient-to-r from-[#111827] to-[#0f152e] border border-blue-900/50 p-6 rounded-2xl relative shadow-xl overflow-hidden">
                                            <div className="absolute -right-10 -top-10 opacity-10"><Icons.Link className="w-40 h-40" /></div>
                                            <h3 className="text-md font-bold text-blue-400 mb-2 flex items-center gap-2"><Icons.Link /> Ligar ao Patriarca (Upline)</h3>
                                            <p className="text-xs text-gray-400 mb-4 max-w-lg">A sua conta é independente. Para se juntar à equipa de um líder e permitir que ele visualize o seu volume de rede, conecte-se abaixo inserindo o UID, Ref Code ou E-mail dele.</p>
                                            
                                            <div className="flex gap-2">
                                                <input 
                                                    type="text" 
                                                    value={uplineSearch} 
                                                    onChange={(e) => setUplineSearch(e.target.value)} 
                                                    placeholder="Ex: UID-MASTER ou lider@email.com" 
                                                    className="w-full max-w-xs bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-sm text-gray-200 focus:outline-none focus:border-blue-500"
                                                />
                                                <button onClick={conectarAoPatriarca} className="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-2 rounded-xl text-sm transition-all shadow-lg">Conectar à Rede</button>
                                            </div>
                                        </div>
                                    )}

                                    {me && me.patriarca_id && (
                                        <div className="bg-[#0b0e1a] border border-emerald-900/30 p-4 rounded-2xl flex items-center justify-between">
                                            <div className="flex items-center gap-3">
                                                <span className="w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-500 flex items-center justify-center"><Icons.Check /></span>
                                                <div>
                                                    <h3 className="text-xs font-bold text-emerald-400">Rede Global Conectada</h3>
                                                    <p className="text-[10px] text-gray-500">O seu nó está corretamente pendurado numa árvore Patriarca.</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div className="bg-[#0b0e1a] border border-[#161f35] p-5 rounded-2xl">
                                            <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Qualificação Ativa</p>
                                            <p className="text-3xl font-extrabold text-white mt-2 flex items-center gap-2">{stats[session.user.id]?.vipLabel || 'V0'}</p>
                                        </div>
                                        <div className="bg-[#0b0e1a] border border-[#161f35] p-5 rounded-2xl">
                                            <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Volume de Equipa</p>
                                            <p className="text-3xl font-extrabold text-blue-400 mt-2">${(stats[session.user.id]?.teamVol || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</p>
                                        </div>
                                        <div className="bg-[#0b0e1a] border border-[#161f35] p-5 rounded-2xl">
                                            <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider">O Meu Aporte</p>
                                            <p className="text-3xl font-extrabold text-emerald-400 mt-2">${getPersonalSum(network[session.user.id]).toLocaleString()}</p>
                                        </div>
                                    </div>

                                    {roadmap && (
                                        <div className="bg-[#0b0e1a] border border-[#161f35] rounded-2xl p-6">
                                            <h3 className="text-sm font-bold text-gray-200 mb-4 flex items-center gap-2"><Icons.Lock /> Requisitos para {roadmap.nextLevel.replace('VIP', 'V')}</h3>
                                            <div className="space-y-3">
                                                <div className="bg-[#12192c] p-4 rounded-xl flex justify-between items-center text-xs">
                                                    <div><h4 className="font-bold text-gray-300">Investimento Pessoal</h4><p className="text-gray-500 mt-1">Acumulado: ${roadmap.personal.current.toLocaleString()} de ${roadmap.personal.req.toLocaleString()}</p></div>
                                                    {roadmap.personal.done ? <Icons.Check /> : <span className="text-amber-500 font-bold">Falta ${roadmap.personal.req - roadmap.personal.current}</span>}
                                                </div>
                                                <div className="bg-[#12192c] p-4 rounded-xl flex justify-between items-center text-xs">
                                                    <div><h4 className="font-bold text-gray-300">Volume de Equipa</h4><p className="text-gray-500 mt-1">Atual: ${roadmap.teamVol.current.toLocaleString()} de ${roadmap.teamVol.req.toLocaleString()}</p></div>
                                                    {roadmap.teamVol.done ? <Icons.Check /> : <span className="text-amber-500 font-bold">Falta ${roadmap.teamVol.req - roadmap.teamVol.current}</span>}
                                                </div>
                                                <div className="bg-[#12192c] p-4 rounded-xl flex justify-between items-center text-xs">
                                                    <div><h4 className="font-bold text-gray-300">Diretos Ativos</h4><p className="text-gray-500 mt-1">Com aporte ≥ $100: {roadmap.directs.current} de {roadmap.directs.req}</p></div>
                                                    {roadmap.directs.done ? <Icons.Check /> : <span className="text-amber-500 font-bold">Falta {roadmap.directs.req - roadmap.directs.current} diretos</span>}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'network' && (
                                <div className="space-y-4">
                                    <div className="flex flex-col md:flex-row justify-between bg-[#0b0e1a] p-4 border border-[#161f35] rounded-2xl gap-4">
                                        <div>
                                            <h3 className="text-sm font-bold text-gray-300">A Sua Ramificação</h3>
                                            <p className="text-[10px] text-gray-500 mt-0.5">Visão isolada e segura. As linhas paralelas do seu Patriarca não são visíveis aqui.</p>
                                        </div>
                                        <div className="bg-slate-950 p-1 rounded-xl flex border border-slate-800">
                                            <button onClick={() => setViewMode('table')} className={`px-3 py-1.5 rounded-lg text-xs font-bold ${viewMode === 'table' ? 'bg-indigo-600 text-white' : 'text-gray-400'}`}>Tabela CRM</button>
                                            <button onClick={() => setViewMode('chart')} className={`px-3 py-1.5 rounded-lg text-xs font-bold ${viewMode === 'chart' ? 'bg-indigo-600 text-white' : 'text-gray-400'}`}>Árvore Gráfica</button>
                                        </div>
                                        <button onClick={() => openAddModal(session.user.id)} className="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-3 py-2 rounded-xl font-bold transition-all">Novo Indicado Manual</button>
                                    </div>

                                    {viewMode === 'table' ? (
                                        <div className="bg-[#0b0e1a] border border-[#161f35] rounded-2xl overflow-hidden shadow-xl overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead className="bg-[#12192c]">
                                                    <tr className="text-[10px] text-gray-400 uppercase font-black">
                                                        <th className="p-3">Membro (Hierarquia)</th>
                                                        <th className="p-3">Aporte Total</th>
                                                        <th className="p-3 text-right">Volume</th>
                                                        <th className="p-3">E-mail / Telefone</th>
                                                        <th className="p-3 text-center font-mono">Níveis 1/2/3+</th>
                                                        <th className="p-3 text-center">Nível VIP</th>
                                                        <th className="p-3 text-right">Ações</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {Object.keys(network).filter(key => visibleMembers.has(key)).map(key => {
                                                        const user = network[key];
                                                        const userStats = stats[key];
                                                        if (!user || !userStats) return null;

                                                        const isRoot = key === session.user.id;
                                                        const isIndependent = user.userId !== session.user.id && !isRoot;
                                                        const isDirectOfRoot = network[session.user.id]?.children.includes(key);
                                                        let indent = isRoot ? 0 : (isDirectOfRoot ? 1 : 2);

                                                        return (
                                                            <tr key={key} className="border-b border-slate-800/40 hover:bg-slate-800/20">
                                                                <td className="p-3 whitespace-nowrap" style={{ paddingLeft: `${indent * 20 + 12}px` }}>
                                                                    <div className="flex items-center text-xs font-bold text-gray-200">
                                                                        <span className={`w-1.5 h-1.5 rounded-full mr-2 ${isRoot ? 'bg-indigo-500' : (isIndependent ? 'bg-emerald-500' : 'bg-gray-500')}`}></span>
                                                                        {user.name} {isIndependent && <span className="ml-2 text-[8px] bg-emerald-900/40 text-emerald-400 px-1.5 py-0.5 rounded font-black tracking-widest uppercase">SaaS Próprio</span>}
                                                                    </div>
                                                                    <div className="text-[9px] text-gray-500 ml-3.5 mt-0.5 font-medium">UID: {user.uid} | Ref: {user.refCode}</div>
                                                                </td>
                                                                <td className="p-3 text-xs font-bold text-gray-200">${getPersonalSum(user).toLocaleString()}</td>
                                                                <td className="p-3 text-xs text-right font-mono text-blue-400 font-bold">${userStats.teamVol.toLocaleString()}</td>
                                                                
                                                                {/* Informações de contato recuperadas na Tabela CRM */}
                                                                <td className="p-3 text-xs text-gray-300">
                                                                    <div className="truncate max-w-[150px] font-medium" title={user.email}>{user.email || 'N/D'}</div>
                                                                    <div className="text-[10px] text-gray-500 mt-0.5">{user.phone || 'N/D'}</div>
                                                                </td>

                                                                <td className="p-3 text-[10px] text-center whitespace-nowrap font-mono text-gray-400">{userStats.level1} / {userStats.level2} / {userStats.level3Plus}</td>
                                                                <td className="p-3 text-center"><span className="px-2 py-0.5 rounded text-[10px] font-bold bg-indigo-600/20 text-indigo-400">{userStats.vipLabel}</span></td>
                                                                <td className="p-3 text-right">
                                                                    <div className="flex justify-end gap-2 text-xs">
                                                                        {!isIndependent && <button onClick={() => openEditModal(key)} className="text-gray-400 hover:text-amber-400 font-bold px-2 py-1 bg-slate-800 rounded">Editar</button>}
                                                                        {!isIndependent && <button onClick={() => openAddModal(key)} className="text-gray-300 hover:text-indigo-400 font-bold px-2 py-1 bg-slate-800 rounded">+ Sub</button>}
                                                                        {!isRoot && !isIndependent && <button onClick={() => handleRemoveMember(key)} className="text-gray-500 hover:text-red-400 px-2">🗑️</button>}
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    ) : (
                                        <div className="bg-[#0b0e1a] border border-[#161f35] rounded-2xl shadow-xl p-4 overflow-hidden relative">
                                            <div className="absolute bottom-6 right-6 z-30 flex items-center gap-2 bg-slate-900/95 p-2 rounded-xl border border-slate-800 shadow-2xl">
                                                <button onClick={() => setZoom(z => Math.min(2.0, z + 0.1))} className="w-8 h-8 rounded-lg bg-indigo-600/30 text-indigo-300 font-black">＋</button>
                                                <span className="text-xs text-gray-300 font-bold font-mono px-1 w-12 text-center select-none">{Math.round(zoom * 100)}%</span>
                                                <button onClick={() => setZoom(z => Math.max(0.4, z - 0.1))} className="w-8 h-8 rounded-lg bg-indigo-600/30 text-indigo-300 font-black">－</button>
                                                <button onClick={() => { setZoom(1.0); setPanOffset({ x: 0, y: 0 }); }} className="text-[10px] bg-slate-800 text-gray-300 px-3 py-1.5 rounded-lg font-bold">Centrar</button>
                                            </div>
                                            <div className={`relative bg-slate-950/40 rounded-xl border border-slate-900 min-h-[620px] select-none ${isDragging ? 'cursor-grabbing' : 'cursor-grab'} overflow-hidden`} {...handleMouseEvents}>
                                                <div className="absolute inset-0 flex justify-center items-start pt-16 transition-transform duration-75 ease-out" style={{ transform: `translate(${panOffset.x}px, ${panOffset.y}px) scale(${zoom})`, transformOrigin: 'top center' }}>
                                                    <div className="inline-block pointer-events-auto">
                                                        <TreeMemberCard memberId={session.user.id} network={network} stats={stats} onEdit={openEditModal} onAddSub={openAddModal} onRemove={handleRemoveMember} currentUserId={session.user.id} />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'calculator' && (
                                <div className="space-y-6 bg-[#0b0e1a] border border-[#161f35] rounded-2xl p-6 shadow-xl">
                                    <h3 className="text-md font-bold text-gray-200">Projeção Financeira sobre a Sua Rede</h3>
                                    <div className="bg-[#12192c] p-4 rounded-xl border border-slate-800">
                                        <div className="flex justify-between items-center text-xs mb-3">
                                            <span className="font-bold text-gray-300">Rendimento Diário do AI Bot na Equipe</span>
                                            <span className="bg-indigo-600 text-white font-black px-2 py-1 rounded">{botYield}%</span>
                                        </div>
                                        <input type="range" min="0.5" max="3.0" step="0.1" value={botYield} onChange={(e) => setBotYield(parseFloat(e.target.value))} className="w-full accent-indigo-600 bg-gray-800 h-2 rounded-lg cursor-pointer" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 text-center font-mono">
                                        <div className="bg-[#0a1d37] border border-blue-900/60 p-5 rounded-2xl">
                                            <p className="text-[10px] text-gray-400 uppercase font-bold mb-2">Lucro Custódias (Diário)</p>
                                            <p className="text-2xl font-black text-emerald-400">${earnings.personalDaily.toLocaleString(undefined, { minimumFractionDigits: 2 })}</p>
                                        </div>
                                        <div className="bg-slate-950 border border-slate-900 p-5 rounded-2xl">
                                            <p className="text-[10px] text-gray-400 uppercase font-bold mb-2">Comissões de Rede (Diário)</p>
                                            <p className="text-2xl font-black text-indigo-400">${earnings.teamDaily.toLocaleString(undefined, { minimumFractionDigits: 2 })}</p>
                                        </div>
                                    </div>
                                    <div className="bg-gradient-to-r from-indigo-950 to-[#0e172a] p-6 rounded-2xl border border-indigo-900/40 text-center font-mono">
                                        <p className="text-xs font-bold text-indigo-300 uppercase tracking-widest mb-2">Estimativa Mensal (30 dias)</p>
                                        <p className="text-4xl font-black text-emerald-400">${earnings.totalMonthly.toLocaleString(undefined, { minimumFractionDigits: 2 })}</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* MODAL DE CADASTRAR / EDITAR - RECONSOLIDADO COM TODOS OS CAMPOS */}
                    {showModal && (
                        <div className="fixed inset-0 bg-black/75 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-[#0b0e1a] border border-[#1c273e] rounded-2xl max-w-lg w-full p-6 space-y-4 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
                                <h3 className="font-bold text-lg text-gray-200 border-b border-slate-800 pb-3">
                                    {modalMode === 'add' ? 'Adicionar Ligação Manual' : `Editar: ${form.name}`}
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="col-span-1 md:col-span-2">
                                        <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Nome Completo *</label>
                                        <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Código Ref</label>
                                        <input type="text" value={form.refCode} onChange={e => setForm({...form, refCode: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Código UID</label>
                                        <input type="text" value={form.uid} onChange={e => setForm({...form, uid: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500" />
                                    </div>
                                    
                                    {/* Campos de contacto resgatados de forma estrita */}
                                    <div>
                                        <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">E-mail de Contacto</label>
                                        <input type="email" value={form.email} onChange={e => setForm({...form, email: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500" placeholder="exemplo@email.com" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Telefone / Telemóvel</label>
                                        <input type="text" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500" placeholder="+351 900 000 000" />
                                    </div>
                                    
                                    <div className="col-span-1 md:col-span-2 bg-[#12192c] p-4 rounded-xl border border-slate-800 space-y-3 mt-2">
                                        <div className="flex justify-between items-center"><h4 className="text-xs font-bold text-indigo-400 uppercase tracking-wider">Custódias da Conta</h4></div>
                                        {formCustodias.map((cust, idx) => (
                                            <div key={cust.id} className="bg-slate-950 p-3 rounded-lg border border-slate-800/80 flex flex-col gap-2 relative">
                                                <button onClick={() => { if(formCustodias.length>1) setFormCustodias(formCustodias.filter(c => c.id !== cust.id)) }} className="absolute top-2 right-2 text-red-500 text-[10px] font-bold">Remover</button>
                                                <div className="grid grid-cols-12 gap-2 mt-2">
                                                    <div className="col-span-6"><label className="block text-[8px] text-gray-500 uppercase font-black mb-1">Rótulo</label><input type="text" value={cust.label} onChange={(e) => { const u = [...formCustodias]; u[idx].label = e.target.value; setFormCustodias(u); }} className="w-full bg-slate-900 border border-slate-800 rounded-lg px-2 py-1 text-xs text-gray-200" /></div>
                                                    <div className="col-span-3"><label className="block text-[8px] text-gray-500 uppercase font-black mb-1">Aporte($)</label><input type="number" value={cust.value} onChange={(e) => { const u = [...formCustodias]; u[idx].value = parseFloat(e.target.value)||0; setFormCustodias(u); }} className="w-full bg-slate-900 border border-slate-800 rounded-lg px-2 py-1 text-xs text-gray-200" /></div>
                                                    <div className="col-span-3"><label className="block text-[8px] text-gray-500 uppercase font-black mb-1">Taxa(%)</label><input type="number" value={cust.rate} onChange={(e) => { const u = [...formCustodias]; u[idx].rate = parseFloat(e.target.value)||0; setFormCustodias(u); }} className="w-full bg-slate-900 border border-slate-800 rounded-lg px-2 py-1 text-xs text-gray-200" /></div>
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={() => setFormCustodias([...formCustodias, { id: 'c_' + Date.now(), label: 'Nova Custódia', value: 100, rate: 15 }])} className="w-full border border-dashed border-indigo-500/40 text-indigo-400 py-2 rounded-xl text-xs font-bold">+ Adicionar Banca</button>
                                    </div>
                                </div>
                                <div className="flex gap-3 justify-end pt-4 border-t border-slate-850">
                                    <button onClick={() => setShowModal(false)} className="bg-slate-950 text-gray-400 border border-slate-800 px-5 py-2.5 rounded-xl text-xs font-bold">Cancelar</button>
                                    <button onClick={handleSaveMember} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl shadow-lg text-xs font-bold">Gravar e Sincronizar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {confirmModal.show && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-[#0b0e1a] border border-red-900 rounded-2xl max-w-sm w-full p-6 space-y-4 shadow-2xl">
                                <h3 className="font-bold text-lg text-red-400">⚠️ {confirmModal.title}</h3>
                                <p className="text-sm text-gray-300">{confirmModal.message}</p>
                                <div className="flex gap-3 justify-end pt-2">
                                    <button onClick={() => setConfirmModal({ show: false, title: '', message: '', action: null })} className="bg-slate-800 text-gray-300 px-4 py-2 rounded-xl text-xs font-bold">Cancelar</button>
                                    <button onClick={() => { confirmModal.action(); setConfirmModal({ show: false, title: '', message: '', action: null }); }} className="bg-red-700 text-white px-4 py-2 rounded-xl text-xs font-bold">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
