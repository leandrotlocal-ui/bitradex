<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Bitradex - Gerenciamento de Rede Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js" crossorigin></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #03050a; color: #f3f4f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useMemo, useEffect } = React;

        // =========================================================================
        // PREVENÇÃO DE TELA PRETA (Error Boundary)
        // =========================================================================
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null, info: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, info) { console.error("Erro Crítico Capturado:", error, info); this.setState({ info }); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-[#03050a] p-6">
                            <div className="bg-red-950 border border-red-800 p-8 rounded-3xl max-w-2xl w-full shadow-2xl">
                                <h1 className="text-2xl font-black text-white mb-2 flex items-center gap-2">⚠️ Ocorreu um Erro Crítico</h1>
                                <p className="text-red-200 text-sm mb-6">O aplicativo foi interrompido para evitar danos aos dados. Tire print deste erro e envie ao suporte técnico:</p>
                                <pre className="bg-black/60 p-4 rounded-xl text-xs overflow-auto font-mono text-red-400 border border-red-900/50 mb-6">
                                    {this.state.error?.toString()}
                                    <br/><br/>
                                    {this.state.info?.componentStack}
                                </pre>
                                <button onClick={() => window.location.reload()} className="bg-red-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-red-500 transition-all">Recarregar Sistema</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // =========================================================================
        // CREDENCIAIS SUPABASE (Não altere)
        // =========================================================================
        if (!window.SUPABASE_URL) window.SUPABASE_URL = "https://ntqiunpljjehuiqdjetc.supabase.co";
        if (!window.SUPABASE_ANON_KEY) window.SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50cWl1bnBsamplaHVpcWRqZXRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjY0NDAsImV4cCI6MjA5NzgwMjQ0MH0.N39lOduuu-pLysAWP6t0PSe6HFdmQELYXsXJ7IwDwpY";
        
        const getSupabase = () => {
            if (window.supabaseClient) return window.supabaseClient;
            const lib = window.supabase || window.Supabase;
            if (lib && window.SUPABASE_URL) {
                try {
                    window.supabaseClient = lib.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
                    return window.supabaseClient;
                } catch (e) { console.error("Falha Supabase:", e); }
            }
            return null;
        };

        const Icons = {
            Dashboard: () => (<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="9" rx="1" /><rect x="14" y="3" width="7" height="5" rx="1" /><rect x="14" y="12" width="7" height="9" rx="1" /><rect x="3" y="16" width="7" height="5" rx="1" /></svg>),
            Network: () => (<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>),
            Link: () => (<svg className="w-5 h-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>),
            Check: () => (<svg className="w-5 h-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>),
            Lock: () => (<svg className="w-5 h-5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0110 0v4" /></svg>)
        };

        const VIP_RULES = [
            { level: 'VIP6', rate: 0.6, reqDirects: 10, reqTeamVol: 15000000, reqPersonal: 3200, prevVip: 'VIP5' },
            { level: 'VIP5', rate: 0.5, reqDirects: 9, reqTeamVol: 6000000, reqPersonal: 1600, prevVip: 'VIP4' },
            { level: 'VIP4', rate: 0.4, reqDirects: 8, reqTeamVol: 2000000, reqPersonal: 800, prevVip: 'VIP3' },
            { level: 'VIP3', rate: 0.3, reqDirects: 7, reqTeamVol: 500000, reqPersonal: 400, prevVip: 'VIP2' },
            { level: 'VIP2', rate: 0.2, reqDirects: 6, reqTeamVol: 150000, reqPersonal: 200, prevVip: 'VIP1' },
            { level: 'VIP1', rate: 0.1, reqDirects: 5, reqTeamVol: 50000, reqPersonal: 100, prevVip: null },
            { level: 'Membro', rate: 0.0, reqDirects: 0, reqTeamVol: 0, reqPersonal: 0, prevVip: null },
        ];

        const getPersonalSum = (user) => {
            if (!user || !user.custodias) return 0;
            return user.custodias.reduce((sum, c) => sum + (parseFloat(c.value) || 0), 0);
        };

        const getMonthlyYield = (user) => {
            if (!user || !user.custodias) return 0;
            return user.custodias.reduce((sum, c) => sum + ((parseFloat(c.value) || 0) * ((parseFloat(c.rate) || 0) / 100)), 0);
        };

        const TreeMemberCard = ({ memberId, network, stats, onEdit, onAddSub, onRemove, currentUserId }) => {
            const member = network[memberId];
            const memberStats = stats[memberId];
            const [isCollapsed, setIsCollapsed] = useState(false);

            if (!member || !memberStats) return null;

            const isRootOfSession = memberId === currentUserId;
            const isIndependentUser = member.userId && member.userId !== currentUserId && !isRootOfSession;
            const hasChildren = member.children && member.children.length > 0;

            return (
                <div className="flex flex-col items-center">
                    <div className={`p-4 rounded-2xl border text-left min-w-[240px] max-w-[280px] shadow-2xl relative transition-all duration-300 z-20
                        ${isRootOfSession ? 'bg-gradient-to-b from-[#0a182d] to-[#040914] border-indigo-500/80 shadow-indigo-950/40' 
                            : isIndependentUser ? 'bg-gradient-to-b from-[#1b241c] to-[#0d140e] border-emerald-600/50 shadow-emerald-950/20'
                            : 'bg-[#0e1222] border-slate-800 shadow-black/40'}`}>
                        
                        {hasChildren && (
                            <button onClick={(e) => { e.stopPropagation(); setIsCollapsed(!isCollapsed); }} className="absolute -bottom-2.5 left-1/2 -translate-x-1/2 w-5 h-5 rounded-full bg-slate-800 border border-slate-600 flex items-center justify-center text-[10px] text-gray-300 hover:bg-indigo-600 z-30 font-black">{isCollapsed ? '+' : '-'}</button>
                        )}

                        <div className="flex items-center justify-between mb-2 gap-2">
                            <span className="text-[9px] px-2 py-0.5 rounded-full font-extrabold uppercase bg-indigo-500/20 text-indigo-400">{memberStats.vipLabel}</span>
                            <div className="flex gap-1 shrink-0">
                                {!isIndependentUser && <button onClick={() => onEdit(memberId)} className="text-[10px] bg-slate-800/80 p-1.5 rounded hover:bg-slate-700 hover:text-white transition-colors" title="Editar">✏️</button>}
                                {!isIndependentUser && <button onClick={() => onAddSub(memberId)} className="text-[10px] bg-indigo-950/40 p-1.5 rounded text-indigo-400 hover:bg-indigo-900 transition-colors" title="Novo Sub-indicado">➕</button>}
                                {!isRootOfSession && !isIndependentUser && <button onClick={() => onRemove(memberId)} className="text-[10px] bg-red-950/40 p-1.5 rounded text-red-400 hover:bg-red-900 transition-colors" title="Excluir Ramificação">🗑️</button>}
                                {isIndependentUser && <span className="text-[8px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded font-black uppercase tracking-widest">SaaS</span>}
                            </div>
                        </div>

                        <h4 className="text-xs font-bold text-gray-100 truncate mt-1">{member.name}</h4>
                        <p className="text-[9px] text-slate-500 font-mono mt-0.5">UID: {member.uid}</p>
                        
                        {/* Indicadores Visuais de Níveis */}
                        <div className="mt-2.5 pt-2 border-t border-slate-800/60 space-y-1 text-[9px] text-slate-400 bg-slate-950/50 p-2 rounded-lg w-full">
                            <div className="flex justify-between items-center">
                                <span title="Indicações Diretas">Diretos (N1):</span>
                                <span className="font-bold text-gray-200 bg-slate-800 px-1.5 rounded">{memberStats.level1}</span>
                            </div>
                            <div className="flex justify-between items-center">
                                <span title="Indicações Indiretas">Indiretos (N2):</span>
                                <span className="font-bold text-blue-400 bg-slate-800 px-1.5 rounded">{memberStats.level2}</span>
                            </div>
                            <div className="flex justify-between items-center">
                                <span title="Restante da Profundidade">Outros (N3+):</span>
                                <span className="font-bold text-indigo-400 bg-slate-800 px-1.5 rounded">{memberStats.level3Plus}</span>
                            </div>
                        </div>

                        <div className="mt-3 pt-2.5 border-t border-slate-850 grid grid-cols-2 gap-2 text-[10px]">
                            <div><span className="text-[8px] text-slate-500 block uppercase font-extrabold tracking-wider">Aporte Total</span><span className="font-semibold text-gray-300">${getPersonalSum(member).toLocaleString()}</span></div>
                            <div><span className="text-[8px] text-slate-500 block uppercase font-extrabold tracking-wider">Vol. Equipa</span><span className="font-semibold text-blue-400">${memberStats.teamVol.toLocaleString()}</span></div>
                        </div>
                    </div>

                    {hasChildren && !isCollapsed && <div className="w-0.5 h-6 bg-slate-700 relative"></div>}

                    {hasChildren && !isCollapsed && (
                        <div className="flex gap-8 relative pt-2">
                            {member.children.map((childId, index) => {
                                const isFirst = index === 0, isLast = index === member.children.length - 1, isSingle = member.children.length === 1;
                                return (
                                    <div key={childId} className="relative flex flex-col items-center">
                                        {!isSingle && <div className="absolute top-0 h-0.5 bg-slate-700" style={{ left: isFirst ? '50%' : '0', right: isLast ? '50%' : '0' }} />}
                                        <div className="w-0.5 h-4 bg-slate-700 z-10"></div>
                                        <TreeMemberCard memberId={childId} network={network} stats={stats} onEdit={onEdit} onAddSub={onAddSub} onRemove={onRemove} currentUserId={currentUserId} />
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [session, setSession] = useState(null);
            const [authMode, setAuthMode] = useState('login'); 
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            const [network, setNetwork] = useState({});
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [viewMode, setViewMode] = useState('table');
            
            const [uplineSearch, setUplineSearch] = useState('');

            // Modais e Alertas
            const [toast, setToast] = useState({ show: false, message: '', error: false });
            const [showModal, setShowModal] = useState(false);
            const [modalMode, setModalMode] = useState('add');
            const [selectedMemberId, setSelectedMemberId] = useState('');
            const [confirmModal, setConfirmModal] = useState({ show: false, title: '', message: '', action: null });
            
            // Custódias Múltiplas suportam Rate (Taxa)
            const [form, setForm] = useState({ name: '', refCode: '', uid: '', email: '', phone: '' });
            const [formCustodias, setFormCustodias] = useState([]);

            const [zoom, setZoom] = useState(1.0);
            const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

            const showNotification = (msg, isError = false) => {
                setToast({ show: true, message: msg, error: isError });
                setTimeout(() => setToast({ show: false, message: '', error: false }), 5000);
            };

            // Monitorar autenticação Supabase
            useEffect(() => {
                const client = getSupabase();
                if (!client) { setLoading(false); return; }

                client.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    if (!session) setLoading(false);
                });

                client.auth.onAuthStateChange((_e, session) => {
                    setSession(session);
                    if (!session) setLoading(false);
                });
            }, []);

            const fetchNetwork = async () => {
                if (!session || !session.user) return;
                setLoading(true);
                const client = getSupabase();
                if (!client) return;

                try {
                    const { data, error } = await client.from('simulador_rede').select('*');
                    
                    if (error) {
                        showNotification("Erro ao Ler Rede: " + error.message, true);
                        setLoading(false);
                        return;
                    }

                    const networkObj = {};
                    if (data) {
                        data.forEach(item => {
                            networkObj[item.id] = {
                                id: item.id,
                                userId: item.user_id,
                                name: item.name || 'Sem Nome',
                                uid: item.uid || '',
                                refCode: item.ref_code || '',
                                email: item.email || '',
                                phone: item.phone || '',
                                patriarca_id: item.patriarca_id,
                                custodias: Array.isArray(item.custodias) ? item.custodias : [],
                                children: Array.isArray(item.children) ? item.children : []
                            };
                        });
                    }

                    // Verifica se o nó raiz do usuário existe
                    const myId = session.user.id;
                    if (!networkObj[myId]) {
                        const baseNode = {
                            id: myId,
                            user_id: myId,
                            name: 'O Meu Perfil SaaS',
                            uid: `UID-${myId.substring(0,6).toUpperCase()}`,
                            ref_code: `REF-${myId.substring(0,4).toUpperCase()}`,
                            email: session.user.email,
                            phone: '',
                            patriarca_id: null,
                            custodias: [{ id: 'c_main', label: 'Banca Principal', value: 0, rate: 15 }],
                            children: [],
                            personal: 0
                        };
                        
                        const { error: upsertErr } = await client.from('simulador_rede').upsert([baseNode]);
                        if (upsertErr) {
                            showNotification("Erro ao criar perfil no banco: " + upsertErr.message, true);
                        } else {
                            networkObj[myId] = {
                                id: baseNode.id, userId: baseNode.user_id, name: baseNode.name, uid: baseNode.uid, refCode: baseNode.ref_code, email: baseNode.email, phone: baseNode.phone, patriarca_id: baseNode.patriarca_id, custodias: baseNode.custodias, children: baseNode.children
                            };
                        }
                    }

                    setNetwork(networkObj);
                } catch (err) {
                    showNotification("Falha geral no sistema: " + err.message, true);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { if (session) fetchNetwork(); }, [session]);

            const handleSaveMember = async () => {
                if (!form.name.trim()) return showNotification("O nome é obrigatório.", true);
                
                const client = getSupabase();
                let updatedNetwork = { ...network };

                // Geração garantida de UID único caso em branco
                const finalUid = form.uid?.trim() || `UID-${Date.now().toString().slice(-5)}${Math.random().toString(36).substring(2, 4).toUpperCase()}`;
                const finalRef = form.refCode?.trim() || `REF-${Date.now().toString().slice(-4)}${Math.random().toString(36).substring(2, 4).toUpperCase()}`;
                const personalSum = formCustodias.reduce((s, c) => s + (parseFloat(c.value) || 0), 0);

                if (modalMode === 'add') {
                    const newId = `node_${Date.now()}`;
                    const newNode = {
                        id: newId, 
                        user_id: session.user.id,
                        name: form.name.trim(), 
                        uid: finalUid,
                        ref_code: finalRef, 
                        email: form.email?.trim() || null, 
                        phone: form.phone?.trim() || null,
                        custodias: formCustodias, 
                        children: [], 
                        personal: personalSum,
                        patriarca_id: selectedMemberId
                    };
                    
                    try {
                        const { error: insertErr } = await client.from('simulador_rede').insert([newNode]);
                        if (insertErr) return showNotification("Erro ao salvar no banco: " + insertErr.message, true);

                        const parentNode = updatedNetwork[selectedMemberId];
                        const newChildrenList = [...(parentNode.children || []), newId];
                        const { error: parentUpdateErr } = await client.from('simulador_rede')
                            .update({ children: newChildrenList }).eq('id', selectedMemberId);
                        
                        if (parentUpdateErr) return showNotification("Erro ao vincular membro: " + parentUpdateErr.message, true);

                        showNotification("Membro registado com sucesso!");
                        fetchNetwork(); 
                        setShowModal(false);
                    } catch (e) { showNotification("Erro crítico: " + e.message, true); }
                } else {
                    // EDIÇÃO
                    try {
                        const { error: updateErr } = await client.from('simulador_rede').update({ 
                            name: form.name.trim(), uid: finalUid, ref_code: finalRef, email: form.email?.trim() || null, phone: form.phone?.trim() || null, custodias: formCustodias, personal: personalSum
                        }).eq('id', selectedMemberId);
                        
                        if (updateErr) return showNotification("Erro ao atualizar banco: " + updateErr.message, true);

                        showNotification("Dados atualizados com sucesso!");
                        fetchNetwork();
                        setShowModal(false);
                    } catch (e) { showNotification("Erro crítico: " + e.message, true); }
                }
            };

            const handleRemoveMember = (id) => {
                const client = getSupabase();
                const member = network[id];
                if (!member) return;

                setConfirmModal({
                    show: true,
                    title: "Excluir Membro e Ramificação",
                    message: `Tem certeza que deseja excluir "${member.name}"? Isso excluirá permanentemente todos os indicados abaixo dele na base de dados.`,
                    action: async () => {
                        let updatedNetwork = { ...network };
                        let parentId = Object.keys(updatedNetwork).find(k => updatedNetwork[k].children.includes(id));
                        
                        const deletedIds = [];
                        const cleanNodes = (nodeId) => {
                            const node = updatedNetwork[nodeId];
                            if (node) {
                                (node.children || []).forEach(cleanNodes);
                                deletedIds.push(nodeId);
                            }
                        };
                        cleanNodes(id);

                        try {
                            if (parentId) {
                                const newChildren = updatedNetwork[parentId].children.filter(cid => cid !== id);
                                await client.from('simulador_rede').update({ children: newChildren }).eq('id', parentId);
                            }
                            const { error } = await client.from('simulador_rede').delete().in('id', deletedIds);
                            if (error) throw error;
                            
                            showNotification("Ramificação removida com sucesso.");
                            fetchNetwork();
                        } catch (e) {
                            showNotification("Erro ao remover: " + e.message, true);
                        }
                    }
                });
            };

            const conectarAoPatriarca = async () => {
                const uidLimpo = uplineSearch.trim().toUpperCase();
                if (!uidLimpo) return showNotification("Introduza um UID válido.", true);
                
                setLoading(true);
                const client = getSupabase();
                
                try {
                    const { data, error } = await client.rpc('conectar_rede_patriarca', {
                        novo_membro_id: session.user.id,
                        termo_busca_patriarca: uidLimpo
                    });

                    if (error) {
                        showNotification("Erro de Servidor RPC: " + error.message, true);
                    } else if (data && data.sucesso) {
                        showNotification("🚀 " + data.mensagem);
                        fetchNetwork();
                    } else {
                        showNotification("⚠️ " + (data?.mensagem || "Líder não localizado."), true);
                    }
                } catch(e) {
                    showNotification("Erro de conexão ao banco de dados.", true);
                } finally {
                    setLoading(false);
                }
            };

            const visibleMembers = useMemo(() => {
                if (!session) return new Set();
                const visible = new Set();
                const traverseDown = (id, visited = new Set()) => {
                    if (!id || !network[id] || visited.has(id)) return;
                    visited.add(id);
                    visible.add(id);
                    (network[id].children || []).forEach(cid => traverseDown(cid, visited));
                };
                traverseDown(session.user.id);
                return visible;
            }, [network, session]);

            const stats = useMemo(() => {
                if (!session || Object.keys(network).length === 0) return {};
                const results = {};

                const calculateNode = (id, visited = new Set()) => {
                    if (visited.has(id)) return { teamVol: 0, directsActive: 0, level: 'Membro', vipLabel: 'V0 (Básico)', level1: 0, level2: 0, level3Plus: 0 };
                    visited.add(id);

                    const node = network[id];
                    if (!node) return { teamVol: 0, directsActive: 0, level: 'Membro', vipLabel: 'V0 (Básico)', level1: 0, level2: 0, level3Plus: 0 };

                    let teamVol = 0;
                    let directsActive = 0;

                    (node.children || []).forEach(cid => {
                        const childStats = calculateNode(cid, new Set(visited));
                        const child = network[cid];
                        if (child) {
                            const childPersonal = getPersonalSum(child);
                            teamVol += childPersonal + childStats.teamVol;
                            if (childPersonal >= 100) directsActive++;
                        }
                    });

                    let currentLevel = 'Membro';
                    const userPersonalSum = getPersonalSum(node);

                    for (const rule of VIP_RULES) {
                        if (rule.level === 'Membro') continue;
                        if (userPersonalSum >= rule.reqPersonal && teamVol >= rule.reqTeamVol && directsActive >= rule.reqDirects) {
                            currentLevel = rule.level;
                            break;
                        }
                    }

                    // Contador de níveis exatos para Dashboard N1, N2, N3+
                    let level1 = 0, level2 = 0, level3Plus = 0;
                    const traverseDepths = (nodeId, depth, depthVisited = new Set()) => {
                        if (depthVisited.has(nodeId)) return;
                        depthVisited.add(nodeId);
                        const targetNode = network[nodeId];
                        if (!targetNode || !targetNode.children) return;
                        
                        targetNode.children.forEach(cid => {
                            if (depth === 1) level1++;
                            else if (depth === 2) level2++;
                            else level3Plus++;
                            traverseDepths(cid, depth + 1, depthVisited);
                        });
                    };
                    traverseDepths(id, 1);

                    results[id] = { teamVol, directsActive, level: currentLevel, vipLabel: currentLevel === 'Membro' ? 'V0' : currentLevel, level1, level2, level3Plus };
                    return results[id];
                };

                if (network[session.user.id]) calculateNode(session.user.id);
                return results;
            }, [network, session]);

            // Cálculo Estimado de Lucros Global Mensal
            const earnings = useMemo(() => {
                if (!session || Object.keys(network).length === 0 || !stats[session.user.id]) return { personal: 0, n1: 0, n2: 0, diff: 0, total: 0 };
                
                const myId = session.user.id;
                const myRate = VIP_RULES.find(r => r.level === stats[myId]?.level)?.rate || 0;
                let n1 = 0, n2 = 0, diff = 0;

                const personal = getMonthlyYield(network[myId]);

                const traverseEarnings = (nodeId, depth, visited = new Set()) => {
                    if (visited.has(nodeId)) return;
                    visited.add(nodeId);

                    const node = network[nodeId];
                    if (!node) return;
                    
                    if (nodeId !== myId) {
                        const nodeYield = getMonthlyYield(node);
                        
                        // 10% diretos, 5% indiretos (Mensal)
                        if (depth === 1) n1 += nodeYield * 0.10;
                        if (depth === 2) n2 += nodeYield * 0.05;

                        // Diferencial VIP (Mensal em cima da produção das equipes)
                        const nodeVipRate = VIP_RULES.find(r => r.level === stats[nodeId]?.level)?.rate || 0;
                        if (myRate > nodeVipRate) {
                            diff += nodeYield * (myRate - nodeVipRate);
                        }
                    }
                    (node.children || []).forEach(cid => traverseEarnings(cid, depth + 1, visited));
                };

                traverseEarnings(myId, 0);
                return { personal, n1, n2, diff, total: personal + n1 + n2 + diff };

                                        <div className="bg-[#0b0e1a] border border-[#161f35] rounded-2xl p-4 relative shadow-xl overflow-hidden">
                                            {/* Controladores de Zoom Flutuantes */}
                                            <div className="absolute bottom-6 right-6 z-30 flex items-center gap-1.5 bg-slate-900/95 p-1.5 rounded-xl border border-slate-800 shadow-2xl">
                                                <button onClick={() => setZoom(z => Math.min(2.0, z + 0.1))} className="w-7 h-7 rounded-lg bg-indigo-600/30 text-indigo-400 font-black hover:bg-indigo-600 hover:text-white transition-colors">＋</button>
                                                <span className="text-[10px] text-gray-400 font-bold font-mono px-1 w-10 text-center">{Math.round(zoom * 100)}%</span>
                                                <button onClick={() => setZoom(z => Math.max(0.4, z - 0.1))} className="w-7 h-7 rounded-lg bg-indigo-600/30 text-indigo-400 font-black hover:bg-indigo-600 hover:text-white transition-colors">－</button>
                                                <button onClick={() => { setZoom(1.0); setPanOffset({ x: 0, y: 0 }); }} className="text-[9px] uppercase font-bold bg-slate-800 text-gray-400 px-2.5 py-1.5 rounded-lg hover:text-white">Centrar</button>
                                            </div>
                                            <div className="absolute top-4 left-4 z-30 pointer-events-none text-[9px] bg-slate-900/80 px-3 py-1.5 rounded-lg text-gray-500 font-bold uppercase tracking-widest border border-slate-800">
                                                Arraste para mover
                                            </div>
                                            <div className={`relative bg-slate-950/40 rounded-xl border border-slate-900 min-h-[550px] overflow-hidden ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`} {...handleMouseEvents}>
                                                <div className="absolute inset-0 flex justify-center items-start pt-16 transition-transform ease-out duration-75" style={{ transform: `translate(${panOffset.x}px, ${panOffset.y}px) scale(${zoom})`, transformOrigin: 'top center' }}>
                                                    <div className="inline-block pointer-events-auto">
                                                        <TreeMemberCard memberId={session.user.id} network={network} stats={stats} onEdit={openEditModal} onAddSub={openAddModal} onRemove={handleRemoveMember} currentUserId={session.user.id} />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </main>

                    {}
                    {showModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-[#0b0e1a] border border-[#1c273e] rounded-3xl max-w-lg w-full p-6 space-y-4 max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl">
                                <div className="flex justify-between items-center border-b border-slate-800 pb-3">
                                    <h3 className="font-black text-lg text-white">
                                        {modalMode === 'add' ? 'Adicionar Novo Indicado' : `Editar Perfil de ${form.name}`}
                                    </h3>
                                    <button onClick={() => setShowModal(false)} className="text-gray-500 hover:text-white transition-colors">
                                        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="col-span-2">
                                        <label className="block text-[10px] text-gray-400 uppercase font-black mb-1">Nome Completo *</label>
                                        <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="João Silva" className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm text-white focus:border-indigo-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-gray-400 uppercase font-black mb-1">E-mail</label>
                                        <input type="email" value={form.email} onChange={e => setForm({...form, email: e.target.value})} placeholder="joao@email.com" className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm text-white focus:border-indigo-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-gray-400 uppercase font-black mb-1">Telefone</label>
                                        <input type="text" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} placeholder="+351 912345678" className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm text-white focus:border-indigo-500 outline-none" />
                                    </div>
                                    
                                    {/* Configuração de Custódias Múltiplas com Rate (%) */}
                                    <div className="col-span-2 bg-[#12192c] p-4 rounded-xl border border-slate-800 space-y-4 mt-2">
                                        <div className="flex justify-between items-center border-b border-slate-800 pb-2">
                                            <h4 className="text-xs font-black text-indigo-400 uppercase tracking-widest">Multi-Custódias</h4>
                                            <span className="text-[10px] font-mono text-gray-400">Total: {formCustodias.length}</span>
                                        </div>
                                        
                                        <div className="space-y-3 max-h-[220px] overflow-y-auto no-scrollbar pr-1">
                                            {formCustodias.map((cust, idx) => (
                                                <div key={cust.id} className="bg-slate-950 p-3 rounded-xl border border-slate-800/80 relative">
                                                    <button onClick={() => {
                                                        if(formCustodias.length === 1) return showNotification("Deve manter pelo menos 1 custódia.", true);
                                                        setFormCustodias(formCustodias.filter(c => c.id !== cust.id));
                                                    }} className="absolute top-2 right-2 text-red-500 hover:text-red-400 text-[10px] font-bold">🗑️ Del</button>
                                                    <div className="grid grid-cols-12 gap-2 mt-2">
                                                        <div className="col-span-6">
                                                            <label className="block text-[8px] text-gray-500 uppercase font-black mb-1">Rótulo / Plano</label>
                                                            <input type="text" value={cust.label} onChange={(e) => { const u = [...formCustodias]; u[idx].label = e.target.value; setFormCustodias(u); }} placeholder="Plano Básico" className="w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-xs text-white outline-none"/>
                                                        </div>
                                                        <div className="col-span-3">
                                                            <label className="block text-[8px] text-gray-500 uppercase font-black mb-1">Valor ($)</label>
                                                            <input type="number" value={cust.value} onChange={(e) => { const u = [...formCustodias]; u[idx].value = parseFloat(e.target.value)||0; setFormCustodias(u); }} placeholder="1000" className="w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-xs text-white outline-none"/>
                                                        </div>
                                                        <div className="col-span-3">
                                                            <label className="block text-[8px] text-gray-500 uppercase font-black mb-1">Taxa (%)</label>
                                                            <input type="number" value={cust.rate} onChange={(e) => { const u = [...formCustodias]; u[idx].rate = parseFloat(e.target.value)||0; setFormCustodias(u); }} placeholder="15" className="w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-xs text-white outline-none"/>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => setFormCustodias([...formCustodias, { id: 'c_' + Date.now(), label: 'Novo Aporte', value: 100, rate: 15 }])} className="w-full border border-dashed border-indigo-500/40 hover:bg-indigo-500/10 text-indigo-400 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all">+ Add Custódia</button>
                                        
                                        <div className="pt-2 border-t border-slate-800 flex justify-between text-[10px] font-black uppercase text-gray-400">
                                            <span>Soma: <span className="text-emerald-400">${formCustodias.reduce((s, c) => s + (parseFloat(c.value) || 0), 0).toLocaleString()}</span></span>
                                            <span>Rend: <span className="text-indigo-400">${formCustodias.reduce((s, c) => s + ((parseFloat(c.value) || 0) * (parseFloat(c.rate) || 0) / 100), 0).toLocaleString()}/mês</span></span>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-3 justify-end pt-4 border-t border-slate-800">
                                    <button onClick={() => setShowModal(false)} className="bg-slate-800 hover:bg-slate-700 text-white px-5 py-2.5 rounded-xl text-xs font-black uppercase transition-colors">Cancelar</button>
                                    <button onClick={handleSaveMember} className="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl shadow-lg shadow-indigo-900/40 text-xs font-black uppercase transition-colors">Salvar e Sincronizar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Confirmação */}
                    {confirmModal.show && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-[#0b0e1a] border border-red-900/50 rounded-3xl max-w-sm w-full p-6 space-y-4 shadow-2xl">
                                <h3 className="font-black text-lg text-red-400 flex items-center gap-2">⚠️ {confirmModal.title}</h3>
                                <p className="text-sm text-gray-300 leading-relaxed">{confirmModal.message}</p>
                                <div className="flex gap-3 justify-end pt-2">
                                    <button onClick={() => setConfirmModal({ show: false, title: '', message: '', action: null })} className="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2.5 rounded-xl text-xs font-black uppercase transition-colors">Cancelar</button>
                                    <button onClick={() => { if (confirmModal.action) confirmModal.action(); setConfirmModal({ show: false, title: '', message: '', action: null }); }} className="bg-red-600 hover:bg-red-500 text-white px-4 py-2.5 rounded-xl text-xs font-black uppercase transition-colors">Confirmar Exclusão</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
