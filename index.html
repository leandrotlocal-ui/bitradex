// COMPONENTE: TELA DE AUTENTICAÇÃO
// ═══════════════════════════════════════════════════════════════════════════════
const AuthScreen = ({ onAuth }) => {
    const [mode, setMode] = useState('login'); // 'login' | 'register'
    const [email, setEmail] = useState('');
    const [password, setPassword] = useState('');
    const [name, setName] = useState('');
    const [uidInput, setUidInput] = useState('');
    const [uplineUid, setUplineUid] = useState('');
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');
    const [success, setSuccess] = useState('');

    const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true); setError('');
        const { data, error } = await sb().auth.signInWithPassword({ email, password });
        if (error) { setError(error.message); setLoading(false); return; }
        onAuth(data.user);
    };

    const handleRegister = async (e) => {
        e.preventDefault();
        if (!name.trim()) { setError('Nome é obrigatório.'); return; }
        if (!uidInput.trim()) { setError('UID é obrigatório.'); return; }
        setLoading(true); setError('');

        // Verifica se o UID já está em uso
        const { data: existing } = await sb().from('user_profiles').select('user_id').eq('uid', uidInput.trim()).single();
        if (existing) { setError('Este UID já está em uso. Verifique com a plataforma Bitradex.'); setLoading(false); return; }

        const { data, error } = await sb().auth.signUp({
            email, password,
            options: { data: { display_name: name, uid: uidInput.trim(), upline_uid: uplineUid.trim() || null } }
        });
        if (error) { setError(error.message); setLoading(false); return; }
        setSuccess('Conta criada! Faça login para entrar no painel.');
        setLoading(false);
    };

    return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-[#03050a]">
            <div className="w-full max-w-md">
                <div className="text-center mb-8">
                    <div className="inline-flex items-center gap-3 mb-4">
                        <span className="p-3 bg-gradient-to-r from-emerald-500 to-indigo-600 rounded-2xl text-white font-extrabold text-2xl shadow-lg shadow-indigo-950/40">MN</span>
                        <div className="text-left">
                            <h1 className="text-2xl font-black text-white tracking-tight">MyNetwork</h1>
                            <p className="text-xs text-gray-500">Painel de Liderança · Rede Bitradex</p>
                        </div>
                    </div>
                </div>

                <div className="bg-[#0b0e1a] border border-[#1b253b] rounded-2xl p-6 shadow-2xl">
                    <div className="flex gap-1 bg-slate-950 p-1 rounded-xl mb-6">
                        <button onClick={() => { setMode('login'); setError(''); setSuccess(''); }}
                            className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all ${mode === 'login' ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:text-white'}`}>
                            Entrar
                        </button>
                        <button onClick={() => { setMode('register'); setError(''); setSuccess(''); }}
                            className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all ${mode === 'register' ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:text-white'}`}>
                            Criar Conta
                        </button>
                    </div>

                    {error && <div className="bg-red-950/50 border border-red-800 text-red-300 text-xs p-3 rounded-xl mb-4">{error}</div>}
                    {success && <div className="bg-emerald-950/50 border border-emerald-800 text-emerald-300 text-xs p-3 rounded-xl mb-4">{success}</div>}

                    <form onSubmit={mode === 'login' ? handleLogin : handleRegister} className="space-y-4">
                        {mode === 'register' && (
                            <div>
                                <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Seu Nome Completo *</label>
                                <input type="text" value={name} onChange={e => setName(e.target.value)} required
                                    className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm focus:border-indigo-500 focus:outline-none text-gray-200" placeholder="Como quer ser identificado"/>
                            </div>
                        )}
                        <div>
                            <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">E-mail *</label>
                            <input type="email" value={email} onChange={e => setEmail(e.target.value)} required
                                className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm focus:border-indigo-500 focus:outline-none text-gray-200" placeholder="seu@email.com"/>
                        </div>
                        <div>
                            <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Senha *</label>
                            <input type="password" value={password} onChange={e => setPassword(e.target.value)} required minLength={6}
                                className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm focus:border-indigo-500 focus:outline-none text-gray-200" placeholder="Mínimo 6 caracteres"/>
                        </div>
                        {mode === 'register' && (
                            <>
                                <div>
                                    <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Seu UID Bitradex *</label>
                                    <input type="text" value={uidInput} onChange={e => setUidInput(e.target.value)} required
                                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm focus:border-indigo-500 focus:outline-none text-gray-200 font-mono" placeholder="Ex: 1234567890"/>
                                    <p className="text-[9px] text-gray-500 mt-1">O UID numérico da sua conta na plataforma Bitradex.</p>
                                </div>
                                <div>
                                    <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">UID do seu Upline (opcional)</label>
                                    <input type="text" value={uplineUid} onChange={e => setUplineUid(e.target.value)}
                                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm focus:border-indigo-500 focus:outline-none text-gray-200 font-mono" placeholder="Ex: 9876543210"/>
                                    <p className="text-[9px] text-gray-500 mt-1">Se alguém te indicou, coloque o UID dele para conectar as redes.</p>
                                </div>
                            </>
                        )}
                        <button type="submit" disabled={loading}
                            className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-indigo-950/40 mt-2">
                            {loading ? 'Aguarde...' : mode === 'login' ? 'Entrar no Painel' : 'Criar minha Conta'}
                        </button>
                    </form>
                </div>
                <p className="text-center text-[10px] text-gray-600 mt-4">MyNetwork · Dados isolados por usuário</p>
            </div>
        </div>
    );
};

// COMPONENTE: CARD DA ÁRVORE

const TreeCard = ({ memberId, network, stats, onEdit, onAddSub, onRemove, rootId }) => {
    const member = network[memberId];
    const memberStats = stats[memberId];
    const [collapsed, setCollapsed] = useState(false);

    if (!member || !memberStats) return null;

    const isRoot = memberId === rootId;
    const isUpline = member._isUpline;
    const hasChildren = member.children?.length > 0;
    const totalPersonal = getPersonalSum(member);

    return (
        <div className="flex flex-col items-center">
            <div className={`p-4 rounded-2xl border text-left min-w-[220px] max-w-[260px] shadow-2xl relative transition-all duration-300 hover:scale-105 z-20
                ${isUpline
                    ? 'bg-gradient-to-b from-[#1b1c24] to-[#0d0e12] border-yellow-600/50 opacity-80'
                    : member._isDownlineUser
                        ? 'bg-gradient-to-b from-[#0d1a0d] to-[#060e06] border-emerald-700/60 shadow-emerald-950/30'
                        : isRoot
                            ? 'bg-gradient-to-b from-[#0a182d] to-[#040914] border-indigo-500/80 shadow-indigo-950/40'
                            : 'bg-[#0e1222] border-slate-800 shadow-black/40'}`}>

                {hasChildren && !isUpline && (
                    <button onClick={e => { e.stopPropagation(); setCollapsed(!collapsed); }}
                        className="absolute -bottom-2.5 left-1/2 -translate-x-1/2 w-5 h-5 rounded-full bg-slate-800 border border-slate-600 flex items-center justify-center text-[10px] text-gray-300 hover:bg-indigo-600 hover:border-indigo-500 transition-colors z-30 font-bold">
                        {collapsed ? '+' : '-'}
                    </button>
                )}

                <div className="flex items-center justify-between gap-1 mb-2">
                    <span className={`text-[9px] px-2 py-0.5 rounded-full font-extrabold uppercase tracking-widest
                        ${memberStats.level === 'Membro' ? 'bg-slate-800 text-gray-400' : 'bg-gradient-to-r from-indigo-500 to-[#4f46e5] text-white'}`}>
                        {memberStats.vipLabel}
                    </span>
                    {!isUpline && !member._isDownlineUser && (
                        <div className="flex gap-1">
                            <button onClick={e => { e.stopPropagation(); onEdit(memberId); }}
                                className="text-[10px] bg-slate-800/80 hover:bg-slate-700 p-1 rounded transition-colors" title="Editar">✏️</button>
                            <button onClick={e => { e.stopPropagation(); onAddSub(memberId); }}
                                className="text-[10px] bg-indigo-950/40 hover:bg-indigo-900 p-1 rounded text-indigo-400 transition-colors" title="Adicionar sub-indicado">➕</button>
                            {!isRoot && (
                                <button onClick={e => { e.stopPropagation(); onRemove(memberId); }}
                                    className="text-[10px] bg-red-950/40 hover:bg-red-900 p-1 rounded text-red-400 transition-colors" title="Remover">🗑️</button>
                            )}
                        </div>
                    )}
                    {member._isDownlineUser && <span className="text-[8px] bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded font-black uppercase">Rede</span>}
                </div>

                <h4 className="text-xs font-bold text-gray-100 truncate mt-1">{member.name}</h4>
                <p className="text-[9px] text-slate-500 font-mono mt-0.5">UID: {member.uid}</p>
                {!isUpline && <p className="text-[8px] text-indigo-400 font-mono font-bold">REF: {member.refCode}</p>}

                <div className="mt-2.5 pt-2 border-t border-slate-800/60 space-y-1 text-[9px] text-slate-400 bg-slate-950/50 p-2 rounded-lg">
                    <div className="flex justify-between"><span>1º Nível:</span><span className="font-bold text-gray-200">{memberStats.level1}</span></div>
                    <div className="flex justify-between"><span>2º Nível:</span><span className="font-bold text-blue-400">{memberStats.level2}</span></div>
                    <div className="flex justify-between"><span>3º Nível+:</span><span className="font-bold text-indigo-300">{memberStats.level3Plus}</span></div>
                </div>

                <div className="mt-3 pt-2 border-t border-slate-800 grid grid-cols-2 gap-2 text-[10px]">
                    <div>
                        <span className="text-[8px] text-slate-500 block uppercase font-extrabold tracking-wider">Aporte</span>
                        <span className="font-semibold text-gray-300">{fmtUSD(totalPersonal, 0)}</span>
                    </div>
                    <div>
                        <span className="text-[8px] text-slate-500 block uppercase font-extrabold tracking-wider">Vol. Equipa</span>
                        <span className="font-semibold text-blue-400">{fmtUSD(memberStats.teamVol, 0)}</span>
                    </div>
                </div>
            </div>

            {hasChildren && !collapsed && <div className="w-0.5 h-6 bg-slate-700"></div>}
            {hasChildren && !collapsed && (
                <div className="flex gap-8 relative pt-2">
                    {member.children.map((cid, i) => {
                        const isSingle = member.children.length === 1;
                        return (
                            <div key={cid} className="relative flex flex-col items-center">
                                {!isSingle && (
                                    <div className="absolute top-0 h-0.5 bg-slate-700"
                                        style={{ left: i === 0 ? '50%' : '0', right: i === member.children.length - 1 ? '50%' : '0' }}/>
                                )}
                                <div className="w-0.5 h-4 bg-slate-700 z-10"></div>
                                <TreeCard memberId={cid} network={network} stats={stats}
                                    onEdit={onEdit} onAddSub={onAddSub} onRemove={onRemove} rootId={rootId}/>
                            </div>
                        );
                    })}
                </div>
            )}
        </div>
    );
};

// ═══════════════════════════════════════════════════════════════════════════════
// COMPONENTE: APP PRINCIPAL
// ═══════════════════════════════════════════════════════════════════════════════
const App = () => {
    const [authUser, setAuthUser] = useState(null);
    const [authLoading, setAuthLoading] = useState(true);
    const [profile, setProfile] = useState(null);
    const [showLanding, setShowLanding] = useState(true);

    // Rede e estado
    const [network, setNetwork] = useState({});
    const [appLoading, setAppLoading] = useState(false);
    const [activeTab, setActiveTab] = useState('dashboard');
    const [viewMode, setViewMode] = useState('chart');
    const [botYield, setBotYield] = useState(1.0);
    const [showUpline, setShowUpline] = useState(true);

    // Modais
    const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
    const [showMemberModal, setShowMemberModal] = useState(false);
    const [modalMode, setModalMode] = useState('add');
    const [selectedMemberId, setSelectedMemberId] = useState('');
    const [confirmModal, setConfirmModal] = useState({ show: false, title: '', message: '', action: null });

    // Form
    const [form, setForm] = useState({ name: '', refCode: '', uid: '', email: '', phone: '' });
    const [formCustodias, setFormCustodias] = useState([]);

    // Painel de conexão de upline
    const [showLinkPanel, setShowLinkPanel] = useState(false);
    const [linkRefInput, setLinkRefInput] = useState('');
    const [linkLoading, setLinkLoading] = useState(false);

    // Zoom e pan
    const [zoom, setZoom] = useState(1.0);
    const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
    const [isDragging, setIsDragging] = useState(false);
    const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

    // ── Notificação ──────────────────────────────────────────────────────────
    const notify = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 3500);
    };

    // ── Auth ─────────────────────────────────────────────────────────────────
    useEffect(() => {
        sb().auth.getSession().then(({ data }) => {
            setAuthUser(data.session?.user || null);
            setAuthLoading(false);
        });
        const { data: { subscription } } = sb().auth.onAuthStateChange((_event, session) => {
            setAuthUser(session?.user || null);
        });
        return () => subscription.unsubscribe();
    }, []);

    useEffect(() => {
        if (authUser) loadProfile();
    }, [authUser]);

    const loadProfile = async () => {
        // Busca perfil do usuário logado na tabela user_profiles
        const { data } = await sb().from('user_profiles').select('*').eq('user_id', authUser.id).single();
        if (data) {
            setProfile(data);
        } else {
            // Cria perfil inicial se não existir
            const meta = authUser.user_metadata || {};
            const refCode = meta.ref_code || 'REF-' + authUser.id.slice(0, 6).toUpperCase();
            const newProfile = {
                user_id: authUser.id,
                display_name: meta.display_name || authUser.email.split('@')[0],
                ref_code: refCode,
                upline_ref: meta.upline_ref || null,
                email: authUser.email,
            };
            const { data: created } = await sb().from('user_profiles').insert(newProfile).select().single();
            setProfile(created || newProfile);
        }
    };

    useEffect(() => {
        if (profile) loadNetwork();
    }, [profile]);

    // ── Carregar rede ─────────────────────────────────────────────────────────
    const loadNetwork = async () => {
        setAppLoading(true);
        const { data, error } = await sb().from('rede_membros')
            .select('*')
            .eq('owner_id', authUser.id);

        if (error) {
            notify('Erro ao carregar rede: ' + error.message, 'error');
            setAppLoading(false);
            return;
        }

        const net = {};

        if (data && data.length > 0) {
            data.forEach(row => {
                net[row.member_id] = {
                    id: row.member_id,
                    name: row.name,
                    uid: row.uid,
                    refCode: row.ref_code,
                    email: row.email || '',
                    phone: row.phone || '',
                    custodias: row.custodias || [{ id: 'c_mig', label: 'Custódia', value: parseFloat(row.personal)||0, rate: 15 }],
                    children: row.children || [],
                };
            });
        } else {
            // Rede vazia — cria nó raiz para o usuário
            const rootNode = {
                id: 'root',
                name: profile.display_name || 'Você',
                uid: 'UID-' + authUser.id.slice(0, 6).toUpperCase(),
                refCode: profile.ref_code,
                email: profile.email,
                phone: '',
                custodias: [{ id: 'c_root_1', label: 'Custódia Principal', value: 0, rate: 15 }],
                children: [],
            };
            net['root'] = rootNode;
            await saveMemberToDb({ ...rootNode, owner_id: authUser.id, member_id: 'root', personal: 0 });
        }

        // Carrega upline se estiver configurado
        if (profile.upline_ref && showUpline) {
            await loadUplineIntoNetwork(net, profile.upline_ref);
        }

        // Carrega downlines — usuários que declararam este usuário como upline
        if (profile.uid) {
            await loadDownlinesIntoNetwork(net, profile.uid);
        }

        setNetwork(net);
        setAppLoading(false);
    };

    // Busca todos os usuários que têm este usuário como upline e injeta as redes deles
    const loadDownlinesIntoNetwork = async (net, myUid) => {
        // Busca perfis que apontam para meu UID como upline
        const { data: downlineProfiles } = await sb().from('user_profiles')
            .select('user_id, display_name, uid, email')
            .eq('upline_ref', myUid);

        if (!downlineProfiles || downlineProfiles.length === 0) return;

        for (const dp of downlineProfiles) {
            // Busca o nó raiz da rede deste downline
            const { data: downlineRoot } = await sb().from('rede_membros')
                .select('*')
                .eq('owner_id', dp.user_id)
                .eq('member_id', 'root')
                .single();

            if (!downlineRoot) continue;

            // Cria um nó representando o downline como filho do root local
            const downlineNodeId = 'dl_' + dp.user_id.slice(0, 8);
            net[downlineNodeId] = {
                id: downlineNodeId,
                name: dp.display_name + ' ★',
                uid: dp.uid,
                refCode: dp.uid,
                email: dp.email,
                phone: '',
                custodias: downlineRoot.custodias || [],
                children: [],
                _isDownlineUser: true,
                _ownerId: dp.user_id,
            };

            // Busca membros da rede do downline para mostrar abaixo dele
            const { data: downlineMembers } = await sb().from('rede_membros')
                .select('*')
                .eq('owner_id', dp.user_id)
                .neq('member_id', 'root');

            if (downlineMembers && downlineMembers.length > 0) {
                downlineMembers.forEach(row => {
                    const nodeId = 'dl_' + dp.user_id.slice(0, 8) + '_' + row.member_id;
                    net[nodeId] = {
                        id: nodeId,
                        name: row.name,
                        uid: row.uid,
                        refCode: row.ref_code,
                        email: row.email || '',
                        phone: row.phone || '',
                        custodias: row.custodias || [],
                        children: (row.children || []).map(c => 'dl_' + dp.user_id.slice(0, 8) + '_' + c),
                        _isDownlineUser: true,
                    };
                });

                // Reconstrói children do nó raiz do downline
                net[downlineNodeId].children = (downlineRoot.children || []).map(c => 'dl_' + dp.user_id.slice(0, 8) + '_' + c);
            }

            // Adiciona o downline como filho do root do patriarca
            if (net['root'] && !net['root'].children.includes(downlineNodeId)) {
                net['root'] = { ...net['root'], children: [...(net['root'].children || []), downlineNodeId] };
            }
        }
    };

    const loadUplineIntoNetwork = async (net, uplineUid) => {
        // Busca o perfil do upline pelo UID numérico
        const { data: uplineProfile } = await sb().from('user_profiles')
            .select('user_id, display_name, uid, email')
            .eq('uid', uplineUid)
            .single();

        if (!uplineProfile) return;

        // Busca o nó raiz da rede do upline
        const { data: uplineRoot } = await sb().from('rede_membros')
            .select('*')
            .eq('owner_id', uplineProfile.user_id)
            .eq('member_id', 'root')
            .single();

        if (uplineRoot) {
            const uplineId = 'upline_' + uplineProfile.user_id.slice(0, 6);
            net[uplineId] = {
                id: uplineId,
                name: uplineProfile.display_name + ' (Seu Upline)',
                uid: uplineProfile.uid,
                refCode: uplineProfile.uid,
                email: uplineProfile.email,
                phone: '',
                custodias: uplineRoot.custodias || [],
                children: ['root'],
                _isUpline: true,
            };
        }
    };

    // ── Persistência no Supabase ──────────────────────────────────────────────
    const saveMemberToDb = async (memberData) => {
        const row = {
            owner_id:  memberData.owner_id || authUser.id,
            member_id: memberData.member_id || memberData.id,
            name:      memberData.name,
            uid:       memberData.uid,
            ref_code:  memberData.refCode,
            email:     memberData.email || '',
            phone:     memberData.phone || '',
            personal:  getPersonalSum(memberData),
            custodias: memberData.custodias || [],
            children:  memberData.children || [],
        };
        const { error } = await sb().from('rede_membros').upsert(row, { onConflict: 'owner_id,member_id' });
        if (error) console.error('Erro ao salvar membro:', error);
        return !error;
    };

    const saveNetwork = async (updatedNetwork, changedIds = []) => {
        setNetwork({ ...updatedNetwork });
        const toSave = changedIds.length > 0
            ? changedIds.map(id => updatedNetwork[id]).filter(Boolean)
            : Object.values(updatedNetwork).filter(m => !m._isUpline);

        for (const m of toSave) {
            if (m._isUpline) continue;
            await saveMemberToDb({ ...m, owner_id: authUser.id, member_id: m.id });
        }
    };

    // ── Conectar ao upline manualmente ───────────────────────────────────────
    const handleLinkUpline = async () => {
        if (!linkRefInput.trim()) return;
        setLinkLoading(true);
        const uid = linkRefInput.trim();

        // Verifica se o upline existe pelo UID
        const { data: uplineProfile } = await sb().from('user_profiles')
            .select('user_id, display_name, uid')
            .eq('uid', uid)
            .single();

        if (!uplineProfile) {
            notify('UID não encontrado. Verifique com seu upline.', 'error');
            setLinkLoading(false);
            return;
        }
        if (uplineProfile.user_id === authUser.id) {
            notify('Você não pode se adicionar como seu próprio upline.', 'error');
            setLinkLoading(false);
            return;
        }

        // Atualiza perfil do usuário com o upline_uid
        const { error } = await sb().from('user_profiles').update({ upline_ref: uid }).eq('user_id', authUser.id);
        if (error) { notify('Erro ao salvar conexão: ' + error.message, 'error'); setLinkLoading(false); return; }

        setProfile(prev => ({ ...prev, upline_ref: uid }));
        notify(`Conectado com sucesso ao upline: ${uplineProfile.display_name}!`, 'success');
        setLinkLoading(false);
        setShowLinkPanel(false);
        setLinkRefInput('');

        // Recarrega rede com upline
        const net = { ...network };
        await loadUplineIntoNetwork(net, uid);
        setNetwork({ ...net });
    };

    const handleDisconnectUpline = async () => {
        await sb().from('user_profiles').update({ upline_ref: null }).eq('user_id', authUser.id);
        setProfile(prev => ({ ...prev, upline_ref: null }));
        // Remove nós de upline da rede
        const net = {};
        Object.entries(network).forEach(([k, v]) => { if (!v._isUpline) net[k] = v; });
        setNetwork(net);
        notify('Upline desconectado.', 'info');
    };

    // ── Logout ────────────────────────────────────────────────────────────────
    const handleLogout = async () => {
        await sb().auth.signOut();
        setAuthUser(null);
        setProfile(null);
        setNetwork({});
    };

    // ── Estatísticas ──────────────────────────────────────────────────────────
    const stats = useMemo(() => {
        if (!Object.keys(network).length) return {};
        const results = {};
        const calcNode = (id) => {
            const node = network[id];
            if (!node) return { teamVol: 0, directsActive: 0, level: 'Membro', vipLabel: 'V0', level1: 0, level2: 0, level3Plus: 0 };

            let teamVol = 0, directsActive = 0, childVips = [];
            (node.children || []).forEach(cid => {
                const cs = calcNode(cid);
                const child = network[cid];
                if (child) {
                    const cp = getPersonalSum(child);
                    teamVol += cp + cs.teamVol;
                    if (cp >= 100) directsActive++;
                    childVips.push({ id: cid, level: cs.level });
                }
            });

            let currentLevel = 'Membro';
            const personal = getPersonalSum(node);
            for (const rule of VIP_RULES) {
                if (rule.level === 'Membro') continue;
                const hasP = personal >= rule.reqPersonal;
                const hasT = teamVol >= rule.reqTeamVol;
                const hasD = directsActive >= rule.reqDirects;
                let hasV = true;
                if (rule.prevVip) {
                    const lines = childVips.filter(cv => cv.level === rule.prevVip || results[cv.id]?.hasVipInTree === rule.prevVip).length;
                    hasV = lines >= 2;
                }
                if (hasP && hasT && hasD && hasV) { currentLevel = rule.level; break; }
            }

            let level1 = 0, level2 = 0, level3Plus = 0;
            const depths = (nid, d) => {
                const n = network[nid];
                if (!n) return;
                (n.children || []).forEach(cid => {
                    if (d === 1) level1++;
                    else if (d === 2) level2++;
                    else level3Plus++;
                    depths(cid, d + 1);
                });
            };
            depths(id, 1);

            const vipLabel = currentLevel === 'Membro' ? 'V0 (Básico)' : `V${currentLevel.replace('VIP', '')}`;
            results[id] = { teamVol, directsActive, level: currentLevel, vipLabel, level1, level2, level3Plus,
                hasVipInTree: currentLevel === 'Membro' ? (childVips.some(cv => results[cv.id]?.hasVipInTree !== 'Membro') ? 'VIP1' : 'Membro') : currentLevel };
            return results[id];
        };

        // Começa pelo upline se existir, senão pela raiz
        const uplineKey = Object.keys(network).find(k => network[k]?._isUpline);
        if (uplineKey) calcNode(uplineKey);
        else calcNode('root');
        return results;
    }, [network]);

    const rootId = 'root';
    const treeRootId = Object.keys(network).find(k => network[k]?._isUpline) || 'root';

    const earnings = useMemo(() => {
        if (!stats[rootId]) return { personalDaily: 0, personalMonthly: 0, direct: 0, indirect: 0, diff: 0, teamDaily: 0, totalDaily: 0, totalMonthly: 0 };
        const myRate = VIP_RULES.find(r => r.level === stats[rootId]?.level)?.rate || 0;
        const personalMonthly = getMonthlyYield(network[rootId]);
        const personalDaily = personalMonthly / 30;

        let direct = 0, indirect = 0, diff = 0;
        const traverse = (id, depth = 0) => {
            const node = network[id];
            if (!node || node._isUpline) return;
            if (id !== rootId) {
                const monthly = getMonthlyYield(node);
                const daily = monthly / 30;
                if (depth === 1) direct += daily * 0.10;
                else if (depth === 2) indirect += daily * 0.05;
                const userRate = VIP_RULES.find(r => r.level === stats[id]?.level)?.rate || 0;
                if (myRate > userRate) {
                    diff += getPersonalSum(node) * (botYield / 100) * (myRate - userRate);
                }
            }
            (node.children || []).forEach(cid => traverse(cid, depth + 1));
        };
        traverse(rootId);
        const teamDaily = direct + indirect + diff;
        return { personalDaily, personalMonthly, direct, indirect, diff, teamDaily, totalDaily: personalDaily + teamDaily, totalMonthly: (personalDaily + teamDaily) * 30 };
    }, [network, stats, botYield]);

    const roadmap = useMemo(() => {
        const cur = stats[rootId]?.level || 'Membro';
        if (cur === 'VIP6') return null;
        const idx = VIP_RULES.findIndex(r => r.level === cur);
        const next = VIP_RULES[idx - 1];
        const personal = getPersonalSum(network[rootId]);
        return {
            nextLevel: next.level,
            personal: { req: next.reqPersonal, current: personal, done: personal >= next.reqPersonal },
            teamVol: { req: next.reqTeamVol, current: stats[rootId]?.teamVol || 0, done: (stats[rootId]?.teamVol || 0) >= next.reqTeamVol },
            directs: { req: next.reqDirects, current: stats[rootId]?.directsActive || 0, done: (stats[rootId]?.directsActive || 0) >= next.reqDirects },
        };
    }, [network, stats]);

    // ── CRUD de membros ───────────────────────────────────────────────────────
    const handleSaveMember = async () => {
        if (!form.name) return notify('O nome é obrigatório.', 'error');
        const updated = { ...network };

        if (modalMode === 'add') {
            const newId = `m_${Date.now()}`;
            updated[newId] = {
                id: newId,
                name: form.name,
                uid: form.uid || 'UID-' + Date.now().toString().slice(-6),
                refCode: form.refCode || 'REF-' + Date.now().toString().slice(-4),
                email: form.email,
                phone: form.phone,
                custodias: formCustodias,
                children: [],
            };
            updated[selectedMemberId] = { ...updated[selectedMemberId], children: [...(updated[selectedMemberId].children || []), newId] };
            await saveNetwork(updated, [newId, selectedMemberId]);
            notify(`Membro "${form.name}" adicionado!`, 'success');
        } else {
            updated[selectedMemberId] = { ...updated[selectedMemberId], name: form.name, uid: form.uid, refCode: form.refCode, email: form.email, phone: form.phone, custodias: formCustodias };
            await saveNetwork(updated, [selectedMemberId]);
            notify(`Dados de "${form.name}" atualizados!`, 'success');
        }
        setShowMemberModal(false);
    };

    const handleRemoveMember = (id) => {
        if (id === 'root') return;
        setConfirmModal({
            show: true,
            title: 'Remover Membro',
            message: `Remover "${network[id]?.name}" e todos os sub-indicados?`,
            action: async () => {
                const updated = { ...network };
                const deletedIds = [];
                const clean = (nid) => {
                    if (!updated[nid]) return;
                    (updated[nid].children || []).forEach(clean);
                    deletedIds.push(nid);
                    delete updated[nid];
                };
                const parentId = Object.keys(updated).find(k => updated[k]?.children?.includes(id));
                if (parentId) updated[parentId] = { ...updated[parentId], children: updated[parentId].children.filter(c => c !== id) };
                clean(id);
                setNetwork({ ...updated });
                // Remove do banco
                for (const did of deletedIds) {
                    await sb().from('rede_membros').delete().eq('owner_id', authUser.id).eq('member_id', did);
                }
                if (parentId) await saveMemberToDb({ ...updated[parentId], owner_id: authUser.id, member_id: parentId });
                notify('Membro removido.', 'info');
            }
        });
    };

    const openAddModal = (parentId) => {
        setModalMode('add'); setSelectedMemberId(parentId);
        setForm({ name: '', refCode: '', uid: '', email: '', phone: '' });
        setFormCustodias([{ id: 'c_' + Date.now(), label: 'Custódia Bitradex', value: 100, rate: 15 }]);
        setShowMemberModal(true);
    };
    const openEditModal = (id) => {
        setModalMode('edit'); setSelectedMemberId(id);
        const m = network[id];
        setForm({ name: m.name, refCode: m.refCode || '', uid: m.uid || '', email: m.email || '', phone: m.phone || '' });
        setFormCustodias(m.custodias ? [...m.custodias] : [{ id: 'c_' + Date.now(), label: 'Custódia', value: 0, rate: 15 }]);
        setShowMemberModal(true);
    };

    // ── Exportar Excel ────────────────────────────────────────────────────────
    const exportExcel = () => {
        if (typeof XLSX === 'undefined') return;
        const rows = [];
        const traverse = (id, depth = 0) => {
            const u = network[id]; const us = stats[id];
            if (!u || !us) return;
            rows.push({
                'Hierarquia': id === 'root' ? 'Você (Líder)' : `Nível ${depth}`,
                'Nome': u.name, 'UID': u.uid, 'Ref': u.refCode, 'Email': u.email||'', 'Telefone': u.phone||'',
                'Aporte ($)': getPersonalSum(u), 'Rend. Mensal ($)': getMonthlyYield(u),
                'Vol. Equipa ($)': us.teamVol, '1º Nível': us.level1, '2º Nível': us.level2, '3º+': us.level3Plus,
                'VIP': us.vipLabel,
            });
            (u.children||[]).forEach(cid => traverse(cid, depth + 1));
        };
        traverse('root');
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Minha_Rede');
        XLSX.writeFile(wb, `Bitradex_Rede_${Date.now()}.xlsx`);
    };

    // ── Pan & zoom ────────────────────────────────────────────────────────────
    const onMouseDown = e => { if (e.target.closest('button')||e.target.closest('input')) return; setIsDragging(true); setDragStart({ x: e.clientX - panOffset.x, y: e.clientY - panOffset.y }); };
    const onMouseMove = e => { if (isDragging) setPanOffset({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y }); };
    const onMouseUp   = () => setIsDragging(false);
    const onTouchStart = e => { if (e.target.closest('button')) return; const t = e.touches[0]; setIsDragging(true); setDragStart({ x: t.clientX - panOffset.x, y: t.clientY - panOffset.y }); };

                <div className="flex items-center gap-2 flex-wrap justify-end">

                                <div>
                                    <h3 className="text-sm font-bold text-gray-300">Estrutura da Rede</h3>

                                        <button onClick={() => setViewMode('chart')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${viewMode==='chart'?'bg-indigo-600 text-white':'text-gray-400'}`}>Árvore</button>
                                    </div>

                                    <button onClick={() => openAddModal('root')} className="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-3 py-2 rounded-xl font-bold transition-all flex items-center gap-1"><Ico.Plus/> Adicionar Direto</button>
                                </div>
                            </div>

                            {viewMode === 'table' ? (

                                        <table className="w-full text-left">

                                                    <th className="p-3 text-right">Aporte</th>
                                                    <th className="p-3 text-right">Vol. Equipa</th>
                                                    <th className="p-3 text-center">Níveis</th>
                                                    <th className="p-3 text-center">VIP</th>

                                            </thead>
                                            <tbody>
                                                {visibleForTable.map(key => {

                                                    const isRoot = key === 'root';
                                                    return (

                                                                </div>
                                                                <div className="text-[9px] text-gray-500 ml-3.5 mt-0.5 font-mono">{u.refCode}</div>
                                                            </td>
                                                            <td className="p-3 text-right text-xs font-bold text-gray-200">{fmtUSD(getPersonalSum(u),0)}</td>
                                                            <td className="p-3 text-right text-xs font-bold text-blue-400">{fmtUSD(us.teamVol,0)}</td>
                                                            <td className="p-3 text-center text-[10px] text-gray-300 font-mono">{us.level1} | {us.level2} | {us.level3Plus}</td>
                                                            <td className="p-3 text-center">
                                                                <span className={`text-[9px] px-2 py-1 rounded-full font-extrabold ${us.level==='Membro'?'bg-slate-800 text-gray-400':'bg-indigo-500/20 text-indigo-300'}`}>{us.vipLabel}</span>

                                    style={{ height: '65vh', cursor: isDragging ? 'grabbing' : 'grab' }}

                                </div>
                            </div>

                            <div className="bg-[#0b0e1a] border border-[#161f35] rounded-2xl p-6">
                                <h3 className="text-sm font-bold text-gray-200 mb-3">Estatísticas da Rede</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    {[
                                        { label: 'Membros totais', value: visibleForTable.length - 1 },
                                        { label: '1º Nível', value: stats[rootId]?.level1 || 0 },
                                        { label: '2º Nível', value: stats[rootId]?.level2 || 0 },
                                        { label: '3º Nível+', value: stats[rootId]?.level3Plus || 0 },
                                    ].map(s => (
                                        <div key={s.label} className="bg-slate-950 border border-slate-800 rounded-xl p-3 text-center">
                                            <p className="text-2xl font-black text-white">{s.value}</p>
                                            <p className="text-[9px] text-gray-500 uppercase font-bold mt-1">{s.label}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-[#0b0e1a] border border-[#161f35] rounded-2xl p-6">
                                <h3 className="text-sm font-bold text-gray-200 mb-3">Como funciona o multi-usuário</h3>
                                <div className="space-y-3 text-xs text-gray-400">
                                    <div className="flex gap-3 bg-slate-950/50 p-3 rounded-xl">
                                        <span className="text-emerald-400 font-black">1.</span>
                                        <p>Cada conta gerencia a sua própria rede de forma independente e isolada.</p>
                                    </div>
                                    <div className="flex gap-3 bg-slate-950/50 p-3 rounded-xl">
                                        <span className="text-indigo-400 font-black">2.</span>
                                        <p>Para conectar redes, o seu upline partilha o código REF dele e você cola em "Conectar Upline".</p>
                                    </div>
                                    <div className="flex gap-3 bg-slate-950/50 p-3 rounded-xl">
                                        <span className="text-yellow-400 font-black">3.</span>
                                        <p>Após conectar, a sua rede aparece abaixo da rede do upline na visualização em árvore.</p>
                                    </div>
                                    <div className="flex gap-3 bg-slate-950/50 p-3 rounded-xl">
                                        <span className="text-blue-400 font-black">4.</span>
                                        <p>O seu código REF é <span className="font-mono text-white">{profile.ref_code}</span> — copie e partilhe com os seus indicados.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            </main>

            {/* ══ MODAL: MEMBRO ══ */}
            {showMemberModal && (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                    <div className="bg-[#0b0e1a] border border-[#1c273e] rounded-2xl max-w-lg w-full p-6 space-y-4 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
                        <div className="flex justify-between items-center border-b border-slate-800 pb-3">
                            <h3 className="font-bold text-lg text-gray-200">
                                {modalMode === 'add' ? 'Adicionar Indicado' : `Editar: ${form.name}`}
                            </h3>
                            <button onClick={() => setShowMemberModal(false)} className="text-gray-500 hover:text-gray-300">✕</button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="md:col-span-2">
                                <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Nome Completo *</label>
                                <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})}
                                    className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none text-gray-200"/>
                            </div>
                            {[
                                { key: 'refCode', label: 'Código REF' },
                                { key: 'uid', label: 'UID' },
                                { key: 'email', label: 'E-mail' },
                                { key: 'phone', label: 'Telefone' },
                            ].map(f => (
                                <div key={f.key}>
                                    <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">{f.label}</label>
                                    <input type="text" value={form[f.key]} onChange={e => setForm({...form, [f.key]: e.target.value})}
                                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none text-gray-200"/>
                                </div>
                            ))}

                            {/* Custódias */}
                            <div className="md:col-span-2 bg-[#12192c] p-4 rounded-xl border border-slate-800 space-y-3">
                                <div className="flex justify-between items-center">
                                    <h4 className="text-xs font-bold text-indigo-400 uppercase tracking-wider">Custódias Ativas</h4>
                                    <span className="text-[10px] text-gray-400">{formCustodias.length} custódia(s)</span>
                                </div>
                                <div className="space-y-2 max-h-48 overflow-y-auto no-scrollbar">
                                    {formCustodias.map((c, i) => (
                                        <div key={c.id} className="bg-slate-950 p-3 rounded-lg border border-slate-800 relative">
                                            <button onClick={() => formCustodias.length > 1 && setFormCustodias(formCustodias.filter(x => x.id !== c.id))}
                                                className="absolute top-2 right-2 text-red-500 hover:text-red-400 text-[10px] font-bold">✕</button>
                                            <div className="grid grid-cols-12 gap-2 mt-1">
                                                <div className="col-span-6">
                                                    <label className="block text-[8px] text-gray-500 uppercase font-black mb-1">Nome</label>
                                                    <input type="text" value={c.label} onChange={e => { const u=[...formCustodias]; u[i].label=e.target.value; setFormCustodias(u); }}
                                                        className="w-full bg-slate-900 border border-slate-800 rounded-lg px-2 py-1 text-xs text-gray-200 focus:outline-none"/>
                                                </div>
                                                <div className="col-span-3">
                                                    <label className="block text-[8px] text-gray-500 uppercase font-black mb-1">Aporte ($)</label>
                                                    <input type="number" value={c.value} onChange={e => { const u=[...formCustodias]; u[i].value=parseFloat(e.target.value)||0; setFormCustodias(u); }}
                                                        className="w-full bg-slate-900 border border-slate-800 rounded-lg px-2 py-1 text-xs text-gray-200 focus:outline-none"/>
                                                </div>
                                                <div className="col-span-3">
                                                    <label className="block text-[8px] text-gray-500 uppercase font-black mb-1">Taxa (%)</label>
                                                    <input type="number" value={c.rate} onChange={e => { const u=[...formCustodias]; u[i].rate=parseFloat(e.target.value)||0; setFormCustodias(u); }}
                                                        className="w-full bg-slate-900 border border-slate-800 rounded-lg px-2 py-1 text-xs text-gray-200 focus:outline-none"/>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setFormCustodias([...formCustodias, { id:'c_'+Date.now(), label:'Nova Custódia', value:100, rate:15 }])}
                                    className="w-full border border-dashed border-indigo-500/40 hover:border-indigo-500/80 text-indigo-400 py-2 rounded-xl text-xs font-bold transition-all">
                                    + Adicionar Custódia
                                </button>
                                <div className="flex justify-between text-[11px] font-bold text-gray-400 pt-1 border-t border-slate-800">
                                    <span>Soma: <span className="text-emerald-400">{fmtUSD(formCustodias.reduce((s,c)=>s+(parseFloat(c.value)||0),0),0)}</span></span>
                                    <span>Rend./mês: <span className="text-indigo-400">{fmtUSD(formCustodias.reduce((s,c)=>s+((parseFloat(c.value)||0)*(parseFloat(c.rate)||0)/100),0))}</span></span>
                                </div>
                            </div>
                        </div>

                        <div className="flex gap-3 justify-end text-xs font-bold pt-2 border-t border-slate-800">
                            <button onClick={() => setShowMemberModal(false)} className="bg-slate-950 hover:bg-slate-900 text-gray-400 border border-slate-800 px-5 py-2.5 rounded-xl">Cancelar</button>
                            <button onClick={handleSaveMember} className="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl shadow-lg">Gravar</button>
                        </div>
                    </div>
                </div>
            )}

            {/* ══ MODAL: CONFIRMAÇÃO ══ */}
            {confirmModal.show && (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                    <div className="bg-[#0b0e1a] border border-red-900 rounded-2xl max-w-sm w-full p-6 space-y-4 shadow-2xl">
                        <h3 className="font-bold text-lg text-red-400">⚠️ {confirmModal.title}</h3>
                        <p className="text-sm text-gray-300">{confirmModal.message}</p>
                        <div className="flex gap-3 justify-end text-xs font-bold">
                            <button onClick={() => setConfirmModal({ show:false, title:'', message:'', action:null })}
                                className="bg-slate-800 text-gray-300 px-4 py-2 rounded-xl">Cancelar</button>
                            <button onClick={() => { confirmModal.action?.(); setConfirmModal({ show:false, title:'', message:'', action:null }); }}
                                className="bg-red-700 hover:bg-red-600 text-white px-4 py-2 rounded-xl">Confirmar</button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
