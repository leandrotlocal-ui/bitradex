<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Bitradex - Gerenciamento de Rede Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js" crossorigin></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <!-- SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #03050a; color: #f3f4f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect } = React;

        const SUPABASE_URL = "https://ntqiunpljjehuiqdjetc.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50cWl1bnBsamplaHVpcWRqZXRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjY0NDAsImV4cCI6MjA5NzgwMjQ0MH0.N39lOduuu-pLysAWP6t0PSe6HFdmQELYXsXJ7IwDwpY";
        
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const App = () => {
            const [user, setUser] = useState(null);
            const [network, setNetwork] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                client.auth.getSession().then(({ data: { session } }) => setUser(session?.user || null));
                client.auth.onAuthStateChange((_event, session) => setUser(session?.user || null));
            }, []);

            useEffect(() => {
                if (user) fetchRede();
            }, [user]);

            const fetchRede = async () => {
                setLoading(true);
                const { data, error } = await client.from('simulador_rede').select('*');
                if (error) {
                    alert("Erro ao carregar rede: " + error.message);
                } else {
                    // Transforma array em mapa
                    const map = {};
                    data.forEach(n => map[n.id] = n);
                    setNetwork(map);
                }
                setLoading(false);
            };

            const handleSave = async (novoMembro) => {
                // Previne strings vazias em campos Unique
                const payload = {
                    ...novoMembro,
                    uid: novoMembro.uid?.trim() || `UID-${Date.now().toString().slice(-6)}`,
                    ref_code: novoMembro.ref_code?.trim() || `REF-${Date.now().toString().slice(-4)}`
                };

                const { error } = await client.from('simulador_rede').upsert([payload]);
                if (error) {
                    alert("Erro ao gravar no Supabase: " + error.message);
                } else {
                    alert("Dados guardados com sucesso!");
                    fetchRede();
                }
            };

            if (!user) return (
                <div className="flex flex-col items-center justify-center h-screen text-white">
                    <h1 className="text-3xl font-black mb-6">Bitradex Login</h1>
                    <button 
                        onClick={() => client.auth.signInAnonymously()}
                        className="bg-indigo-600 px-8 py-3 rounded-xl font-bold"
                    >
                        Entrar como Convidado
                    </button>
                </div>
            );

            return (
                <div className="p-8 text-white">
                    <h1 className="text-2xl font-black mb-4">Bem-vindo, {user.email || 'Convidado'}</h1>
                    {loading ? <p>A carregar rede...</p> : (
                        <div className="bg-slate-900 p-6 rounded-xl">
                            <h2 className="font-bold mb-4">A sua rede no banco de dados:</h2>
                            <pre className="text-xs bg-black p-4 rounded">{JSON.stringify(network, null, 2)}</pre>
                            <button 
                                onClick={() => handleSave({id: user.id, name: 'Teste Novo', uid: '', ref_code: ''})}
                                className="mt-4 bg-emerald-600 px-4 py-2 rounded font-bold"
                            >
                                Adicionar Membro de Teste (Auto UID)
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
